<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">BFS: Queue-Based Traversal Implementation</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Queue drives level-by-level exploration &#x2014; discover all neighbors before going deeper</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- Row backgrounds -->
  <rect x="20" y="78" width="820" height="52" fill="#f9f9f9"/>
  <rect x="20" y="130" width="820" height="54" fill="white"/>
  <rect x="20" y="184" width="820" height="54" fill="#f9f9f9"/>
  <rect x="20" y="238" width="820" height="76" fill="white"/>
  <rect x="20" y="314" width="820" height="88" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Guard clause ===== -->
  <rect x="30" y="86" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="102" fill="#4ec9b0">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt; </tspan><tspan fill="#9cdcfe">result</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="40" y="118" fill="#c586c0">if</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#dcdcaa">has_vertex</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">start</tspan><tspan fill="#ddd">)) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">result</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="106" x2="458" y2="106" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,102 466,106 458,110" fill="#bdc3c7"/>

  <text x="476" y="104" font-size="11" fill="#555"><tspan font-weight="bold">Guard:</tspan> return empty vector if start vertex</text>
  <text x="476" y="120" font-size="11" fill="#555">doesn't exist in the graph.</text>

  <!-- ===== ROW 2: Data structures ===== -->
  <rect x="30" y="138" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="154" fill="#4ec9b0">queue</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt; </tspan><tspan fill="#9cdcfe">q</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="40" y="170" fill="#4ec9b0">unordered_set</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt; </tspan><tspan fill="#9cdcfe">visited</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="158" x2="458" y2="158" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,154 466,158 458,162" fill="#bdc3c7"/>

  <text x="476" y="154" font-size="11" fill="#555"><tspan font-weight="bold" fill="#27ae60">Queue</tspan> for FIFO processing order.</text>
  <text x="476" y="170" font-size="11" fill="#555"><tspan font-weight="bold">Set</tspan> to track which vertices we've visited.</text>

  <!-- ===== ROW 3: Seed ===== -->
  <rect x="30" y="192" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="208" fill="#9cdcfe">q</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">start</tspan><tspan fill="#ddd">);</tspan>
    <tspan x="40" y="224" fill="#9cdcfe">visited</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">insert</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">start</tspan><tspan fill="#ddd">);</tspan>
  </text>

  <line x1="410" y1="212" x2="458" y2="212" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,208 466,212 458,216" fill="#bdc3c7"/>

  <text x="476" y="206" font-size="11" fill="#555"><tspan font-weight="bold">Seed:</tspan> enqueue start and mark visited NOW.</text>
  <text x="476" y="222" font-size="11" fill="#555">Marking at enqueue time prevents duplicates.</text>

  <!-- ===== ROW 4: Main loop &#x2014; dequeue ===== -->
  <text x="30" y="252" font-size="10" fill="#555" font-style="italic">Main loop: dequeue front vertex, add to result</text>

  <rect x="30" y="258" width="380" height="50" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="274" fill="#c586c0">while</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#9cdcfe">q</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">empty</tspan><tspan fill="#ddd">()) {</tspan>
    <tspan x="60" y="290" fill="#4ec9b0">string</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">current</tspan><tspan fill="#ddd"> = </tspan><tspan fill="#9cdcfe">q</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">front</tspan><tspan fill="#ddd">(); </tspan><tspan fill="#9cdcfe">q</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">pop</tspan><tspan fill="#ddd">();</tspan>
    <tspan x="60" y="306" fill="#9cdcfe">result</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push_back</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">current</tspan><tspan fill="#ddd">);</tspan>
  </text>

  <line x1="410" y1="283" x2="458" y2="283" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,279 466,283 458,287" fill="#bdc3c7"/>

  <text x="476" y="272" font-size="11" fill="#27ae60" font-weight="bold">Dequeue from FRONT (FIFO).</text>
  <text x="476" y="288" font-size="11" fill="#555">Process vertices in discovery order.</text>
  <text x="476" y="304" font-size="11" fill="#555">Each vertex enters the queue exactly once.</text>

  <!-- ===== ROW 5: Explore neighbors ===== -->
  <text x="30" y="328" font-size="10" fill="#555" font-style="italic">Loop body: enqueue all unvisited neighbors</text>

  <rect x="30" y="334" width="380" height="66" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="60" y="350" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">neighbor</tspan><tspan fill="#ddd"> : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">at</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">current</tspan><tspan fill="#ddd">)) {</tspan>
    <tspan x="80" y="366" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">visited</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">find</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">neighbor</tspan><tspan fill="#ddd">) == </tspan><tspan fill="#9cdcfe">visited</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">end</tspan><tspan fill="#ddd">()) {</tspan>
    <tspan x="100" y="382" fill="#9cdcfe">visited</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">insert</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">neighbor</tspan><tspan fill="#ddd">);</tspan>
    <tspan x="100" y="398" fill="#9cdcfe">q</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">neighbor</tspan><tspan fill="#ddd">);</tspan>
  </text>

  <line x1="410" y1="367" x2="458" y2="367" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,363 466,367 458,371" fill="#bdc3c7"/>

  <text x="476" y="350" font-size="11" fill="#555">Check each neighbor. If not yet visited:</text>
  <text x="476" y="366" font-size="11" fill="#555"><tspan font-weight="bold">mark visited and enqueue.</tspan></text>
  <text x="476" y="382" font-size="11" fill="#555">Marking at push time prevents the same vertex</text>
  <text x="476" y="398" font-size="11" fill="#555">from entering the queue twice.</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="412" width="800" height="80" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="430" y="434" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Why BFS Finds Shortest Paths</text>
  <text x="430" y="454" text-anchor="middle" fill="#555" font-size="12">The queue is FIFO &#x2014; vertices discovered first are processed first.</text>
  <text x="430" y="472" text-anchor="middle" fill="#555" font-size="12">All distance-1 vertices are dequeued before any distance-2 vertices.</text>
  <text x="430" y="488" text-anchor="middle" fill="#888" font-size="11">Level-by-level exploration = shortest path first in unweighted graphs.</text>
</svg>