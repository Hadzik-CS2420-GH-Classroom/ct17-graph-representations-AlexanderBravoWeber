<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 510" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">neighbors() &#x2014; Return Neighbor List</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Find the vertex in the map, return a copy of its neighbor vector</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- Row backgrounds -->
  <rect x="20" y="78" width="820" height="56" fill="#f9f9f9"/>
  <rect x="20" y="134" width="820" height="60" fill="white"/>
  <rect x="20" y="194" width="820" height="56" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Signature ===== -->
  <rect x="30" y="90" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="108" fill="#4ec9b0">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt; </tspan><tspan fill="#dcdcaa">neighbors</tspan><tspan fill="#ddd">(</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">) </tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> {</tspan>
  </text>

  <line x1="410" y1="103" x2="458" y2="103" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,99 466,103 458,107" fill="#bdc3c7"/>

  <text x="476" y="102" font-size="11" fill="#555">Returns the neighbor list for a given vertex.</text>

  <!-- ===== ROW 2: Find + guard ===== -->
  <rect x="30" y="142" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="158" fill="#569cd6">auto</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">it</tspan><tspan fill="#ddd"> = </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">find</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">);</tspan>
    <tspan x="50" y="174" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">it</tspan><tspan fill="#ddd"> == </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">end</tspan><tspan fill="#ddd">()) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd"> {};</tspan>
  </text>

  <line x1="410" y1="162" x2="458" y2="162" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,158 466,162 458,166" fill="#bdc3c7"/>

  <text x="476" y="155" font-size="11" fill="#555"><tspan font-weight="bold">Guard:</tspan> if vertex not found, return empty vector.</text>
  <text x="476" y="171" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">{}</tspan> constructs an empty <tspan font-family="Consolas, monospace" font-size="10">vector&lt;string&gt;</tspan>.</text>

  <!-- ===== ROW 3: Return ===== -->
  <rect x="30" y="206" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="224" fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">it</tspan><tspan fill="#ddd">-></tspan><tspan fill="#9cdcfe">second</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="219" x2="458" y2="219" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,215 466,219 458,223" fill="#bdc3c7"/>

  <text x="476" y="214" font-size="11" fill="#27ae60" font-weight="bold">Return the neighbor vector.</text>
  <text x="476" y="230" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">it-&gt;second</tspan> is the value (<tspan font-family="Consolas, monospace" font-size="10">vector&lt;string&gt;</tspan>) in the map.</text>

  <!-- ===== EXAMPLE ===== -->
  <rect x="30" y="258" width="800" height="190" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="430" y="282" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Example: neighbors("B") on graph A&#x2014;B, B&#x2014;D, B&#x2014;E, A&#x2014;C</text>

  <!-- B (center, highlighted) -->
  <circle cx="160" cy="366" r="22" fill="#eaf2f8" stroke="#2980b9" stroke-width="2.5"/>
  <text x="160" y="372" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">B</text>

  <!-- B's neighbors: A, D, E — radiating left, upper-right, lower-right -->
  <!-- A (left of B) -->
  <line x1="138" y1="366" x2="100" y2="366" stroke="#2980b9" stroke-width="2"/>
  <circle cx="82" cy="366" r="18" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="82" y="372" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">A</text>

  <!-- D (upper-right of B) -->
  <line x1="178" y1="352" x2="230" y2="322" stroke="#2980b9" stroke-width="2"/>
  <circle cx="248" cy="312" r="18" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="248" y="318" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">D</text>

  <!-- E (lower-right of B) -->
  <line x1="178" y1="380" x2="230" y2="404" stroke="#2980b9" stroke-width="2"/>
  <circle cx="248" cy="414" r="18" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="248" y="420" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">E</text>

  <!-- C (connected to A, clearly below A) -->
  <line x1="82" y1="384" x2="82" y2="410" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="82" cy="428" r="18" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="82" y="434" text-anchor="middle" fill="#999" font-size="11" font-weight="bold">C</text>
  <text x="50" y="404" fill="#bdc3c7" font-size="9">A&#x2014;C</text>

  <!-- Arrow + result -->
  <text x="320" y="366" font-size="16" fill="#27ae60" font-weight="bold">&#x2192;</text>

  <text x="350" y="336" font-size="11" fill="#555" font-family="Consolas, monospace">neighbors("B")</text>
  <text x="350" y="352" font-size="11" fill="#555">returns:</text>

  <!-- Returned vector visual -->
  <rect x="350" y="366" width="50" height="26" rx="4" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="375" y="384" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">A</text>

  <rect x="406" y="366" width="50" height="26" rx="4" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="431" y="384" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">D</text>

  <rect x="462" y="366" width="50" height="26" rx="4" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="487" y="384" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">E</text>

  <text x="528" y="384" font-size="11" fill="#888">&#x2190; vector&lt;string&gt;</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="460" width="800" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="478" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Returns a copy &#x2014; modifying the returned vector won't affect the graph.</text>
  <text x="430" y="494" text-anchor="middle" fill="#888" font-size="11">Same find-then-access pattern as has_edge(), but returns the whole list instead of searching it.</text>
</svg>