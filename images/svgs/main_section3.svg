<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Section 3: BFS from Alice</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">Breadth-First Search explores level by level using a queue</text>

  <!-- Graph with BFS coloring -->
  <rect x="30" y="65" width="380" height="250" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>

  <circle cx="200" cy="110" r="22" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="2.5"/>
  <text x="200" y="116" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Alice</text>
  <text x="245" y="110" fill="#27ae60" font-size="10" font-weight="bold">1st</text>

  <circle cx="120" cy="185" r="22" fill="#2980b9" fill-opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="120" y="191" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Bob</text>
  <text x="78" y="185" fill="#2980b9" font-size="10" font-weight="bold">2nd</text>

  <circle cx="280" cy="185" r="22" fill="#2980b9" fill-opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="280" y="191" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Carol</text>
  <text x="320" y="185" fill="#2980b9" font-size="10" font-weight="bold">3rd</text>

  <circle cx="70" cy="260" r="22" fill="#8e44ad" fill-opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="70" y="266" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Dave</text>
  <text x="45" y="240" fill="#8e44ad" font-size="10" font-weight="bold">4th</text>

  <circle cx="200" cy="270" r="22" fill="#8e44ad" fill-opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="200" y="276" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Eve</text>
  <text x="240" y="270" fill="#8e44ad" font-size="10" font-weight="bold">5th</text>

  <line x1="186" y1="128" x2="134" y2="168" stroke="#bbb" stroke-width="1.5"/>
  <line x1="214" y1="128" x2="266" y2="168" stroke="#bbb" stroke-width="1.5"/>
  <line x1="106" y1="202" x2="84" y2="243" stroke="#bbb" stroke-width="1.5"/>
  <line x1="134" y1="202" x2="186" y2="253" stroke="#bbb" stroke-width="1.5"/>
  <line x1="266" y1="202" x2="214" y2="253" stroke="#bbb" stroke-width="1.5"/>

  <!-- Output -->
  <rect x="440" y="65" width="430" height="250" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="655" y="93" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">Expected Output</text>

  <text x="470" y="125" fill="#555" font-size="12" font-weight="bold">BFS order:</text>
  <text x="470" y="150" fill="#27ae60" font-size="14" font-weight="bold">Alice</text>
  <text x="520" y="150" fill="#bbb">&#x2192;</text>
  <text x="540" y="150" fill="#2980b9" font-size="14" font-weight="bold">Bob</text>
  <text x="575" y="150" fill="#bbb">&#x2192;</text>
  <text x="595" y="150" fill="#2980b9" font-size="14" font-weight="bold">Carol</text>
  <text x="645" y="150" fill="#bbb">&#x2192;</text>
  <text x="665" y="150" fill="#8e44ad" font-size="14" font-weight="bold">Dave</text>
  <text x="710" y="150" fill="#bbb">&#x2192;</text>
  <text x="730" y="150" fill="#8e44ad" font-size="14" font-weight="bold">Eve</text>

  <text x="470" y="185" fill="#27ae60" font-size="11">Distance 0: Alice</text>
  <text x="470" y="205" fill="#2980b9" font-size="11">Distance 1: Bob, Carol (Alice's neighbors)</text>
  <text x="470" y="225" fill="#8e44ad" font-size="11">Distance 2: Dave, Eve (Bob's and Carol's neighbors)</text>

  <rect x="460" y="250" width="390" height="45" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="1.2"/>
  <text x="655" y="270" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">Queue guarantees level-by-level order</text>
  <text x="655" y="286" text-anchor="middle" fill="#555" font-size="10">All dist-1 vertices processed before any dist-2 vertices</text>

  <!-- Bottom note -->
  <rect x="30" y="330" width="840" height="40" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1.2"/>
  <text x="450" y="355" text-anchor="middle" fill="#555" font-size="12">BFS finds <tspan font-weight="bold">shortest paths</tspan> in unweighted graphs &#x2014; Alice to Dave is 2 hops (Alice &#x2192; Bob &#x2192; Dave)</text>
</svg>
