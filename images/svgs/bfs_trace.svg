<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 805" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">BFS Step-by-Step Trace</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="13">Starting from A on graph: A--B, A--C, B--D, B--E, C--E</text>

  <!-- Column headers -->
  <rect x="30" y="65" width="840" height="30" rx="6" fill="#27ae60"/>
  <text x="80" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Step</text>
  <text x="200" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Action</text>
  <text x="420" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Queue (front &#x2192; back)</text>
  <text x="640" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Visited</text>
  <text x="810" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Result</text>

  <!-- Step 0: Setup -->
  <rect x="30" y="100" width="840" height="50" rx="0" fill="#f0faf0"/>
  <text x="80" y="122" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">0</text>
  <text x="200" y="118" text-anchor="middle" fill="#555" font-size="11">Enqueue A</text>
  <text x="200" y="132" text-anchor="middle" fill="#555" font-size="10">Add A to visited set</text>
  <rect x="370" y="110" width="40" height="24" rx="4" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="390" y="127" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">A</text>
  <text x="640" y="127" text-anchor="middle" fill="#555" font-size="11">{A}</text>
  <text x="810" y="127" text-anchor="middle" fill="#bbb" font-size="11">[ ]</text>

  <!-- Step 1: Dequeue A -->
  <rect x="30" y="155" width="840" height="55" rx="0" fill="white"/>
  <text x="80" y="185" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">1</text>
  <text x="200" y="173" text-anchor="middle" fill="#555" font-size="11">Dequeue <tspan font-weight="bold" fill="#27ae60">A</tspan>, add A to result</text>
  <text x="200" y="187" text-anchor="middle" fill="#555" font-size="10">Enqueue A's neighbors: B, C</text>
  <text x="200" y="200" text-anchor="middle" fill="#555" font-size="10">Add B, C to visited set</text>
  <rect x="370" y="168" width="40" height="24" rx="4" fill="white" stroke="#2980b9" stroke-width="1.5"/>
  <text x="390" y="185" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">B</text>
  <rect x="415" y="168" width="40" height="24" rx="4" fill="white" stroke="#2980b9" stroke-width="1.5"/>
  <text x="435" y="185" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">C</text>
  <text x="640" y="185" text-anchor="middle" fill="#555" font-size="11">{A, B, C}</text>
  <text x="810" y="185" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">[A]</text>

  <!-- Step 2: Dequeue B -->
  <rect x="30" y="215" width="840" height="55" rx="0" fill="#f0faf0"/>
  <text x="80" y="245" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold">2</text>
  <text x="200" y="233" text-anchor="middle" fill="#555" font-size="11">Dequeue <tspan font-weight="bold" fill="#2980b9">B</tspan>, add B to result</text>
  <text x="200" y="247" text-anchor="middle" fill="#555" font-size="10">B's neighbors: A (visited), D, E (not visited)</text>
  <text x="200" y="260" text-anchor="middle" fill="#555" font-size="10">Enqueue D, E; add D, E to visited set</text>
  <rect x="370" y="228" width="40" height="24" rx="4" fill="white" stroke="#2980b9" stroke-width="1.5"/>
  <text x="390" y="245" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">C</text>
  <rect x="415" y="228" width="40" height="24" rx="4" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="435" y="245" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">D</text>
  <rect x="460" y="228" width="40" height="24" rx="4" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="480" y="245" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">E</text>
  <text x="640" y="245" text-anchor="middle" fill="#555" font-size="11">{A, B, C, D, E}</text>
  <text x="810" y="245" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">[A, B]</text>

  <!-- Step 3: Dequeue C -->
  <rect x="30" y="275" width="840" height="55" rx="0" fill="white"/>
  <text x="80" y="305" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold">3</text>
  <text x="200" y="293" text-anchor="middle" fill="#555" font-size="11">Dequeue <tspan font-weight="bold" fill="#2980b9">C</tspan>, add C to result</text>
  <text x="200" y="307" text-anchor="middle" fill="#555" font-size="10">C's neighbors: A (visited), E (visited)</text>
  <text x="200" y="320" text-anchor="middle" fill="#555" font-size="10">All visited &#x2014; nothing enqueued</text>
  <rect x="370" y="288" width="40" height="24" rx="4" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="390" y="305" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">D</text>
  <rect x="415" y="288" width="40" height="24" rx="4" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="435" y="305" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">E</text>
  <text x="640" y="305" text-anchor="middle" fill="#555" font-size="11">{A, B, C, D, E}</text>
  <text x="810" y="305" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">[A, B, C]</text>

  <!-- Step 4: Dequeue D -->
  <rect x="30" y="335" width="840" height="55" rx="0" fill="#f0faf0"/>
  <text x="80" y="365" text-anchor="middle" fill="#8e44ad" font-size="12" font-weight="bold">4</text>
  <text x="200" y="353" text-anchor="middle" fill="#555" font-size="11">Dequeue <tspan font-weight="bold" fill="#8e44ad">D</tspan>, add D to result</text>
  <text x="200" y="367" text-anchor="middle" fill="#555" font-size="10">D's neighbor B already visited</text>
  <text x="200" y="380" text-anchor="middle" fill="#555" font-size="10">Nothing enqueued</text>
  <rect x="370" y="348" width="40" height="24" rx="4" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="390" y="365" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">E</text>
  <text x="640" y="365" text-anchor="middle" fill="#555" font-size="11">{A, B, C, D, E}</text>
  <text x="810" y="365" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">[A, B, C, D]</text>

  <!-- Step 5: Dequeue E -->
  <rect x="30" y="395" width="840" height="50" rx="0" fill="white"/>
  <text x="80" y="423" text-anchor="middle" fill="#8e44ad" font-size="12" font-weight="bold">5</text>
  <text x="200" y="415" text-anchor="middle" fill="#555" font-size="11">Dequeue <tspan font-weight="bold" fill="#8e44ad">E</tspan>, add E to result</text>
  <text x="200" y="429" text-anchor="middle" fill="#555" font-size="10">Queue empty &#x2014; done!</text>
  <text x="420" y="423" text-anchor="middle" fill="#bbb" font-size="11">empty</text>
  <text x="640" y="423" text-anchor="middle" fill="#555" font-size="11">{A, B, C, D, E}</text>
  <text x="810" y="423" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">[A, B, C, D, E]</text>

  <!-- ===== KEY INSIGHT ===== -->
  <rect x="30" y="460" width="840" height="70" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="485" text-anchor="middle" fill="#27ae60" font-size="14" font-weight="bold">Why This Order?</text>
  <text x="450" y="505" text-anchor="middle" fill="#555" font-size="12">The queue is <tspan font-weight="bold">FIFO</tspan> &#x2014; vertices discovered first are processed first.</text>
  <text x="450" y="521" text-anchor="middle" fill="#555" font-size="12">All distance-1 vertices (B, C) are dequeued before any distance-2 vertices (D, E).</text>

  <!-- ===== GRAPH REFERENCE ===== -->
  <rect x="30" y="545" width="840" height="250" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="200" y="570" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">The Graph</text>

  <!-- Graph: same layout as BFS overview -->
  <circle cx="200" cy="610" r="22" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="2.5"/>
  <text x="200" y="616" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">A</text>

  <circle cx="120" cy="685" r="22" fill="#2980b9" fill-opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="120" y="691" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">B</text>

  <circle cx="280" cy="685" r="22" fill="#2980b9" fill-opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="280" y="691" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">C</text>

  <circle cx="70" cy="750" r="22" fill="#8e44ad" fill-opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="70" y="756" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">D</text>

  <circle cx="200" cy="750" r="22" fill="#8e44ad" fill-opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="200" y="756" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">E</text>

  <line x1="186" y1="628" x2="134" y2="668" stroke="#bbb" stroke-width="1.5"/>
  <line x1="214" y1="628" x2="266" y2="668" stroke="#bbb" stroke-width="1.5"/>
  <line x1="106" y1="702" x2="84" y2="733" stroke="#bbb" stroke-width="1.5"/>
  <line x1="134" y1="702" x2="186" y2="733" stroke="#bbb" stroke-width="1.5"/>
  <line x1="266" y1="702" x2="214" y2="733" stroke="#bbb" stroke-width="1.5"/>

  <!-- Color key -->
  <text x="550" y="595" fill="#2c3e50" font-size="13" font-weight="bold">Visit Order by Distance</text>

  <circle cx="540" cy="625" r="10" fill="#27ae60" fill-opacity="0.2" stroke="#27ae60" stroke-width="2"/>
  <text x="560" y="630" fill="#2c3e50" font-size="12"><tspan font-weight="bold" fill="#27ae60">Distance 0:</tspan> A (start)</text>

  <circle cx="540" cy="660" r="10" fill="#2980b9" fill-opacity="0.15" stroke="#2980b9" stroke-width="2"/>
  <text x="560" y="665" fill="#2c3e50" font-size="12"><tspan font-weight="bold" fill="#2980b9">Distance 1:</tspan> B, C (A's neighbors)</text>

  <circle cx="540" cy="695" r="10" fill="#8e44ad" fill-opacity="0.15" stroke="#8e44ad" stroke-width="2"/>
  <text x="560" y="700" fill="#2c3e50" font-size="12"><tspan font-weight="bold" fill="#8e44ad">Distance 2:</tspan> D, E (neighbors of B, C)</text>
</svg>
