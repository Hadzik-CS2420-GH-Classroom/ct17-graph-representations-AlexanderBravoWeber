<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 684" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">edge_count() &#x2014; Breaking Down the For Loop</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Structured binding unpacks each map entry into two variables</text>

  <!-- ===== SYNTAX BREAKDOWN ===== -->
  <rect x="30" y="64" width="800" height="210" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="430" y="86" text-anchor="middle" fill="#2980b9" font-size="14" font-weight="bold">Syntax Breakdown</text>

  <!-- The code line -->
  <rect x="60" y="96" width="500" height="28" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="74" y="115" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; [</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">nbrs</tspan><tspan fill="#ddd">] : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">)</tspan>
  </text>

  <!-- Labeled breakdown — no lines, just color-coded rows -->
  <text x="80" y="148" font-size="11" fill="#888" font-weight="bold" font-family="Consolas, monospace">const auto&amp;</text>
  <text x="240" y="148" font-size="11" fill="#555">Read-only reference &#x2014; don't copy, don't modify.</text>

  <text x="80" y="170" font-size="11" fill="#2980b9" font-weight="bold" font-family="Consolas, monospace">[vertex, nbrs]</text>
  <text x="240" y="170" font-size="11" fill="#555"><tspan font-weight="bold" fill="#2980b9">Structured binding</tspan> &#x2014; unpacks the pair into two variables:</text>
  <text x="240" y="186" font-size="11" fill="#555"><tspan fill="#2980b9" font-family="Consolas, monospace" font-size="10">vertex</tspan> = pair.first (the key), <tspan fill="#e67e22" font-family="Consolas, monospace" font-size="10">nbrs</tspan> = pair.second (the value)</text>

  <text x="80" y="208" font-size="11" fill="#888" font-weight="bold" font-family="Consolas, monospace">: adj_list_</text>
  <text x="240" y="208" font-size="11" fill="#555">Iterate every entry in the unordered_map.</text>

  <!-- Equivalence box -->
  <rect x="60" y="224" width="740" height="40" rx="6" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="430" y="240" text-anchor="middle" font-size="11" fill="#555">Same as the longer version:</text>
  <text x="430" y="256" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#333">for (const auto&amp; p : adj_list_) { auto vertex = p.first; auto nbrs = p.second; }</text>

  <!-- ===== ITERATION TRACE ===== -->
  <text x="430" y="310" text-anchor="middle" fill="#2c3e50" font-size="15" font-weight="bold">Tracing Each Iteration (Triangle: A&#x2014;B, A&#x2014;C, B&#x2014;C)</text>

  <!-- Table header -->
  <rect x="30" y="324" width="800" height="28" rx="6" fill="#2980b9"/>
  <text x="80" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Iteration</text>
  <text x="200" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="bold">vertex</text>
  <text x="350" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="bold">nbrs</text>
  <text x="520" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="bold">nbrs.size()</text>
  <text x="660" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="bold">total after +=</text>

  <!-- Iteration 1 -->
  <rect x="30" y="356" width="800" height="36" fill="#f0faf0"/>
  <text x="80" y="378" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">1</text>
  <text x="200" y="378" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold" font-family="Consolas, monospace">"A"</text>
  <text x="200" y="388" text-anchor="middle" fill="#888" font-size="9">(it-&gt;first)</text>
  <text x="350" y="378" text-anchor="middle" fill="#555" font-size="12" font-family="Consolas, monospace">["B", "C"]</text>
  <text x="350" y="388" text-anchor="middle" fill="#888" font-size="9">(it-&gt;second)</text>
  <text x="520" y="378" text-anchor="middle" fill="#555" font-size="12">2</text>
  <text x="660" y="378" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">0 + 2 = 2</text>

  <!-- Iteration 2 -->
  <rect x="30" y="396" width="800" height="36" fill="white"/>
  <text x="80" y="418" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">2</text>
  <text x="200" y="418" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold" font-family="Consolas, monospace">"B"</text>
  <text x="350" y="418" text-anchor="middle" fill="#555" font-size="12" font-family="Consolas, monospace">["A", "C"]</text>
  <text x="520" y="418" text-anchor="middle" fill="#555" font-size="12">2</text>
  <text x="660" y="418" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">2 + 2 = 4</text>

  <!-- Iteration 3 -->
  <rect x="30" y="436" width="800" height="36" fill="#f0faf0"/>
  <text x="80" y="458" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">3</text>
  <text x="200" y="458" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold" font-family="Consolas, monospace">"C"</text>
  <text x="350" y="458" text-anchor="middle" fill="#555" font-size="12" font-family="Consolas, monospace">["A", "B"]</text>
  <text x="520" y="458" text-anchor="middle" fill="#555" font-size="12">2</text>
  <text x="660" y="458" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">4 + 2 = 6</text>

  <!-- After loop -->
  <rect x="30" y="476" width="800" height="36" fill="#fdf2f2"/>
  <text x="80" y="498" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">done</text>
  <text x="350" y="498" text-anchor="middle" fill="#555" font-size="11">Loop finished. All 3 vertices visited.</text>
  <text x="660" y="498" text-anchor="middle" fill="#c0392b" font-size="13" font-weight="bold">total = 6</text>

  <!-- ===== DIVIDE BY 2 ===== -->
  <rect x="30" y="522" width="800" height="56" rx="8" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>

  <rect x="60" y="532" width="200" height="22" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="74" y="548" fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">total</tspan><tspan fill="#ddd"> / 2;</tspan><tspan fill="#6a9955">  // 6 / 2</tspan>
  </text>

  <text x="290" y="548" font-size="12" fill="#555">&#x2192; returns <tspan font-weight="bold" fill="#27ae60">3</tspan></text>

  <text x="500" y="540" font-size="11" fill="#555">6 total entries across all neighbor lists,</text>
  <text x="500" y="556" font-size="11" fill="#555">but each edge was counted <tspan font-weight="bold" fill="#c0392b">twice</tspan> (A&#x2192;B and B&#x2192;A).</text>
  <text x="500" y="570" font-size="11" fill="#555">Divide by 2 = <tspan font-weight="bold" fill="#27ae60">3 actual edges</tspan>.</text>

  <!-- ===== NOTE ===== -->
  <rect x="30" y="588" width="800" height="36" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.2"/>
  <text x="430" y="608" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">Note: vertex is unused in this function!</text>
  <text x="430" y="620" text-anchor="middle" fill="#555" font-size="11">We only need nbrs.size(). The binding still unpacks both, but we only read the value side.</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="634" width="800" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="652" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Structured bindings are a shorthand for .first / .second.</text>
  <text x="430" y="668" text-anchor="middle" fill="#555" font-size="11">You'll see them in edge_count() and print() &#x2014; any time you iterate an unordered_map.</text>
</svg>