<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">has_edge() &#x2014; Step-by-Step Trace</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Calling has_edge("A", "C") on graph: A&#x2014;B, A&#x2014;C, B&#x2014;D</text>

  <!-- ===== ADJACENCY LIST REFERENCE ===== -->
  <rect x="560" y="60" width="270" height="128" rx="8" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="695" y="80" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">adj_list_ (the map)</text>

  <!-- Column labels -->
  <text x="600" y="96" text-anchor="middle" fill="#888" font-size="9" font-weight="bold">KEY</text>
  <text x="720" y="96" text-anchor="middle" fill="#888" font-size="9" font-weight="bold">VALUE (neighbors)</text>

  <!-- A row -->
  <rect x="582" y="102" width="36" height="20" rx="4" fill="#2980b9"/>
  <text x="600" y="117" text-anchor="middle" fill="white" font-size="10" font-weight="bold">A</text>
  <text x="626" y="117" fill="#999" font-size="12">&#x2192;</text>
  <text x="640" y="117" fill="#555" font-size="10" font-family="Consolas, monospace">[B, C]</text>
  <text x="700" y="117" fill="#888" font-size="9">&#x2190; .first  &#x2190; .second</text>

  <!-- B row -->
  <rect x="582" y="126" width="36" height="20" rx="4" fill="#2980b9"/>
  <text x="600" y="141" text-anchor="middle" fill="white" font-size="10" font-weight="bold">B</text>
  <text x="626" y="141" fill="#999" font-size="12">&#x2192;</text>
  <text x="640" y="141" fill="#555" font-size="10" font-family="Consolas, monospace">[A, D]</text>

  <!-- D row -->
  <rect x="582" y="150" width="36" height="20" rx="4" fill="#2980b9"/>
  <text x="600" y="165" text-anchor="middle" fill="white" font-size="10" font-weight="bold">D</text>
  <text x="626" y="165" fill="#999" font-size="12">&#x2192;</text>
  <text x="640" y="165" fill="#555" font-size="10" font-family="Consolas, monospace">[B]</text>

  <!-- ===== STEP 1 ===== -->
  <rect x="30" y="60" width="510" height="56" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="50" cy="82" r="12" fill="#2980b9"/>
  <text x="50" y="87" text-anchor="middle" fill="white" font-size="11" font-weight="bold">1</text>

  <rect x="70" y="72" width="300" height="22" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="80" y="88" fill="#569cd6">auto</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">it</tspan><tspan fill="#ddd"> = </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">find</tspan><tspan fill="#ddd">(</tspan><tspan fill="#ce9178">"A"</tspan><tspan fill="#ddd">);</tspan>
  </text>

  <text x="70" y="108" font-size="11" fill="#555">Search the map for key "A". <tspan font-weight="bold" fill="#27ae60">Found!</tspan> <tspan fill="#555" font-family="Consolas, monospace" font-size="10">it</tspan> now points to the A entry.</text>

  <!-- ===== STEP 2 ===== -->
  <rect x="30" y="126" width="510" height="56" rx="8" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="50" cy="148" r="12" fill="#2980b9"/>
  <text x="50" y="153" text-anchor="middle" fill="white" font-size="11" font-weight="bold">2</text>

  <rect x="70" y="138" width="300" height="22" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="80" y="154" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">it</tspan><tspan fill="#ddd"> == </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">end</tspan><tspan fill="#ddd">()) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">false</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <text x="70" y="174" font-size="11" fill="#555">Is it == end()? <tspan font-weight="bold" fill="#27ae60">No</tspan> &#x2014; "A" exists. Continue.</text>

  <!-- ===== STEP 3 — EXPANDED ===== -->
  <rect x="30" y="194" width="800" height="110" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <circle cx="50" cy="216" r="12" fill="#2980b9"/>
  <text x="50" y="221" text-anchor="middle" fill="white" font-size="11" font-weight="bold">3</text>

  <rect x="70" y="206" width="300" height="22" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="80" y="222" fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">nbrs</tspan><tspan fill="#ddd"> = </tspan><tspan fill="#9cdcfe">it</tspan><tspan fill="#ddd">-></tspan><tspan fill="#9cdcfe">second</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <text x="70" y="244" font-size="12" fill="#2c3e50" font-weight="bold">What is it-&gt;first and it-&gt;second?</text>
  <text x="70" y="262" font-size="11" fill="#555">The iterator <tspan font-family="Consolas, monospace" font-size="10">it</tspan> points to a <tspan font-weight="bold">pair</tspan> in the map: { key, value }.</text>

  <text x="70" y="282" font-size="11" fill="#555"><tspan fill="#2980b9" font-weight="bold" font-family="Consolas, monospace" font-size="10">it-&gt;first</tspan>  = the key =  <tspan font-family="Consolas, monospace" font-size="10">"A"</tspan></text>
  <text x="348" y="282" font-size="10" fill="#888">(we don't use this here, but it's there)</text>

  <text x="70" y="298" font-size="11" fill="#555"><tspan fill="#e67e22" font-weight="bold" font-family="Consolas, monospace" font-size="10">it-&gt;second</tspan> = the value = <tspan font-family="Consolas, monospace" font-size="10">["B", "C"]</tspan></text>
  <text x="348" y="298" font-size="10" fill="#888">(A's neighbor vector &#x2014; this is what we need!)</text>

  <!-- ===== STEP 4 ===== -->
  <rect x="30" y="316" width="800" height="70" rx="8" fill="#f9f9f9" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="50" cy="338" r="12" fill="#2980b9"/>
  <text x="50" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="bold">4</text>

  <rect x="70" y="328" width="420" height="22" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="80" y="344" fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#dcdcaa">find</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">nbrs</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">begin</tspan><tspan fill="#ddd">(), </tspan><tspan fill="#9cdcfe">nbrs</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">end</tspan><tspan fill="#ddd">(), </tspan><tspan fill="#ce9178">"C"</tspan><tspan fill="#ddd">) != </tspan><tspan fill="#9cdcfe">nbrs</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">end</tspan><tspan fill="#ddd">();</tspan>
  </text>

  <text x="70" y="366" font-size="11" fill="#555">Linear search through ["B", "C"] for "C".</text>
  <text x="70" y="380" font-size="11" fill="#555">Check B... no. Check C... <tspan font-weight="bold" fill="#27ae60">found!</tspan> Return <tspan font-weight="bold" fill="#27ae60">true</tspan>.</text>

  <!-- ===== VISUAL: the linear scan ===== -->
  <rect x="30" y="400" width="800" height="86" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="430" y="420" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">Step 4 closeup: std::find scans the neighbor vector</text>

  <!-- nbrs vector -->
  <text x="120" y="452" font-size="11" fill="#555" font-weight="bold">nbrs =</text>

  <!-- B cell -->
  <rect x="180" y="436" width="60" height="28" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="210" y="455" text-anchor="middle" fill="#555" font-size="12" font-family="Consolas, monospace">"B"</text>
  <text x="210" y="478" text-anchor="middle" fill="#c0392b" font-size="10">&#x2716; not "C"</text>

  <!-- C cell -->
  <rect x="260" y="436" width="60" height="28" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="290" y="455" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold" font-family="Consolas, monospace">"C"</text>
  <text x="290" y="478" text-anchor="middle" fill="#27ae60" font-size="10">&#x2714; match!</text>

  <!-- Arrow showing scan direction -->
  <line x1="180" y1="430" x2="320" y2="430" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="320,427 328,430 320,433" fill="#888"/>
  <text x="340" y="434" font-size="9" fill="#888">scan direction</text>

  <!-- Result -->
  <text x="500" y="452" font-size="12" fill="#555">find &#x2260; end &#x2192; <tspan font-weight="bold" fill="#27ae60">return true</tspan></text>
  <text x="500" y="470" font-size="10" fill="#888">Edge A&#x2014;C exists!</text>

  <!-- ===== COUNTEREXAMPLE ===== -->
  <rect x="30" y="498" width="800" height="56" rx="8" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="430" y="518" text-anchor="middle" fill="#c0392b" font-size="13" font-weight="bold">What if we called has_edge("A", "Z") instead?</text>
  <text x="430" y="536" text-anchor="middle" fill="#555" font-size="11">Step 3: nbrs = ["B", "C"]. Step 4: scan B... no. Scan C... no. Reached end. <tspan font-weight="bold" fill="#c0392b">find == end &#x2192; return false.</tspan></text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="566" width="800" height="44" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="584" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Every map entry is a pair: it-&gt;first = key, it-&gt;second = value.</text>
  <text x="430" y="600" text-anchor="middle" fill="#555" font-size="11">This pattern (find &#x2192; check end &#x2192; access second) appears in has_edge, neighbors, and many STL programs.</text>
</svg>