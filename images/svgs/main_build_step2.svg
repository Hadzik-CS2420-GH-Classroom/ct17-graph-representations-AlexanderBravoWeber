<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Section 1, Step 2: add_edge("Alice", "Carol")</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">Alice already exists &#x2014; just append Carol to her list</text>

  <!-- What happens -->
  <rect x="30" y="65" width="420" height="160" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="50" y="88" fill="#2c3e50" font-size="12" font-family="Consolas, monospace">g.add_edge(<tspan fill="#2980b9">"Alice"</tspan>, <tspan fill="#2980b9">"Carol"</tspan>);</text>
  <text x="240" y="108" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">What Happens Inside</text>

  <circle cx="55" cy="128" r="8" fill="#27ae60"/>
  <text x="55" y="132" text-anchor="middle" fill="white" font-size="9" font-weight="bold">1</text>
  <text x="75" y="132" fill="#2c3e50" font-size="11">Alice already exists &#x2192; add_vertex does nothing</text>

  <circle cx="55" cy="154" r="8" fill="#27ae60"/>
  <text x="55" y="158" text-anchor="middle" fill="white" font-size="9" font-weight="bold">2</text>
  <text x="75" y="158" fill="#2c3e50" font-size="11">Carol doesn't exist &#x2192; <tspan font-weight="bold">create key "Carol"</tspan></text>

  <circle cx="55" cy="180" r="8" fill="#27ae60"/>
  <text x="55" y="184" text-anchor="middle" fill="white" font-size="9" font-weight="bold">3</text>
  <text x="75" y="184" fill="#2c3e50" font-size="11">Add <tspan font-weight="bold" fill="#e67e22">"Carol"</tspan> to Alice's list &#x2014; now [Bob, <tspan font-weight="bold" fill="#e67e22">Carol</tspan>]</text>

  <circle cx="55" cy="206" r="8" fill="#27ae60"/>
  <text x="55" y="210" text-anchor="middle" fill="white" font-size="9" font-weight="bold">4</text>
  <text x="75" y="210" fill="#2c3e50" font-size="11">Add <tspan font-weight="bold" fill="#e67e22">"Alice"</tspan> to Carol's list &#x2014; now [<tspan font-weight="bold" fill="#e67e22">Alice</tspan>]</text>

  <!-- Resulting map -->
  <rect x="470" y="65" width="400" height="140" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="670" y="88" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">adj_list_ After Step 2</text>

  <rect x="500" y="105" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="527" y="123" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Alice</text>
  <text x="568" y="123" fill="#999" font-size="13">&#x2192;</text>
  <rect x="588" y="108" width="45" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="610" y="122" text-anchor="middle" fill="#2c3e50" font-size="10">Bob</text>
  <rect x="638" y="108" width="50" height="20" rx="4" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="663" y="122" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">Carol</text>

  <rect x="500" y="138" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="527" y="156" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Bob</text>
  <text x="568" y="156" fill="#999" font-size="13">&#x2192;</text>
  <rect x="588" y="141" width="50" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="613" y="155" text-anchor="middle" fill="#2c3e50" font-size="10">Alice</text>

  <rect x="500" y="171" width="55" height="26" rx="5" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="527" y="189" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">Carol</text>
  <text x="568" y="189" fill="#999" font-size="13">&#x2192;</text>
  <rect x="588" y="174" width="50" height="20" rx="4" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="613" y="188" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">Alice</text>

  <!-- Stats -->
  <rect x="30" y="245" width="840" height="80" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1.2"/>
  <text x="150" y="275" text-anchor="middle" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Vertices:</tspan> 3</text>
  <text x="350" y="275" text-anchor="middle" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Edges:</tspan> 2</text>
  <text x="600" y="275" text-anchor="middle" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Total map entries:</tspan> 4</text>
  <text x="450" y="298" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">Orange = new in this step</text>
  <text x="450" y="314" text-anchor="middle" fill="#777" font-size="11">Alice's list grew from [Bob] to [Bob, Carol] &#x2014; Carol was appended</text>
</svg>
