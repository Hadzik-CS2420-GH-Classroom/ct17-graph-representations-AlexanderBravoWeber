<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">bfs() &#x2014; Code Execution Trace</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Tracing bfs("A") on graph: A&#x2014;B, A&#x2014;C, B&#x2014;D, B&#x2014;E, C&#x2014;E</text>

  <!-- ===== CODE REFERENCE (left side) ===== -->
  <rect x="30" y="64" width="260" height="150" rx="8" fill="#1e1e1e"/>
  <text x="40" y="80" fill="#888" font-size="9">Key lines:</text>
  <text font-family="Consolas, 'Courier New', monospace" font-size="9">
    <tspan x="40" y="96" fill="#9cdcfe">q</tspan><tspan fill="#ddd">.push(start); visited.insert(start);</tspan>
    <tspan x="40" y="112" fill="#c586c0">while</tspan><tspan fill="#ddd"> (!q.empty()) {</tspan>
    <tspan x="50" y="128" fill="#9cdcfe">current</tspan><tspan fill="#ddd"> = q.front(); q.pop();</tspan>
    <tspan x="50" y="144" fill="#9cdcfe">result</tspan><tspan fill="#ddd">.push_back(current);</tspan>
    <tspan x="50" y="160" fill="#c586c0">for</tspan><tspan fill="#ddd"> (neighbor : adj_list_[current])</tspan>
    <tspan x="60" y="176" fill="#c586c0">if</tspan><tspan fill="#ddd"> (!visited) {</tspan>
    <tspan x="70" y="192" fill="#ddd">visited.insert(nbr); q.push(nbr);</tspan>
    <tspan x="40" y="208" fill="#c586c0">return</tspan><tspan fill="#ddd"> result;</tspan>
  </text>

  <!-- ===== GRAPH REFERENCE ===== -->
  <rect x="340" y="64" width="200" height="150" rx="8" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="440" y="82" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">The Graph</text>

  <circle cx="420" cy="110" r="14" fill="#eaf2f8" stroke="#27ae60" stroke-width="2"/>
  <text x="420" y="115" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">A</text>

  <circle cx="390" cy="150" r="14" fill="white" stroke="#2980b9" stroke-width="1.5"/>
  <text x="390" y="155" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">B</text>
  <circle cx="460" cy="150" r="14" fill="white" stroke="#2980b9" stroke-width="1.5"/>
  <text x="460" y="155" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">C</text>

  <circle cx="370" cy="190" r="14" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="370" y="195" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">D</text>
  <circle cx="420" cy="190" r="14" fill="white" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="420" y="195" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">E</text>

  <line x1="412" y1="122" x2="396" y2="138" stroke="#bbb" stroke-width="1.2"/>
  <line x1="428" y1="122" x2="454" y2="138" stroke="#bbb" stroke-width="1.2"/>
  <line x1="380" y1="162" x2="374" y2="178" stroke="#bbb" stroke-width="1.2"/>
  <line x1="400" y1="162" x2="414" y2="178" stroke="#bbb" stroke-width="1.2"/>
  <line x1="454" y1="162" x2="426" y2="178" stroke="#bbb" stroke-width="1.2"/>

  <!-- ===== VARIABLE LEGEND ===== -->
  <rect x="558" y="64" width="272" height="150" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="694" y="84" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Variable Legend</text>

  <text x="574" y="102" fill="#2980b9" font-size="10" font-weight="bold" font-family="Consolas, monospace">q</text>
  <text x="600" y="102" fill="#555" font-size="10">The queue (FIFO). Waiting to be processed.</text>
  <text x="600" y="114" fill="#888" font-size="9">enqueue = <tspan fill="#555" font-family="Consolas, monospace">q.push()</tspan>, dequeue = <tspan fill="#555" font-family="Consolas, monospace">q.front() + q.pop()</tspan></text>

  <text x="574" y="132" fill="#2980b9" font-size="10" font-weight="bold" font-family="Consolas, monospace">current</text>
  <text x="632" y="132" fill="#555" font-size="10">Vertex just dequeued from front.</text>

  <text x="574" y="150" fill="#2980b9" font-size="10" font-weight="bold" font-family="Consolas, monospace">visited</text>
  <text x="632" y="150" fill="#555" font-size="10">Set of vertices already seen.</text>

  <text x="574" y="168" fill="#2980b9" font-size="10" font-weight="bold" font-family="Consolas, monospace">result</text>
  <text x="624" y="168" fill="#555" font-size="10">Output vector &#x2014; visit order returned.</text>

  <line x1="574" y1="178" x2="814" y2="178" stroke="#27ae60" stroke-width="0.5" opacity="0.5"/>
  <text x="574" y="194" fill="#555" font-size="10">Mark visited at <tspan font-weight="bold" fill="#27ae60">push</tspan> time &#x2192; each vertex</text>
  <text x="574" y="208" fill="#555" font-size="10">enters the queue <tspan font-weight="bold">exactly once</tspan>.</text>

  <!-- ===== TRACE TABLE ===== -->
  <text x="430" y="236" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Execution Trace: bfs("A")</text>

  <!-- Header -->
  <rect x="30" y="246" width="800" height="26" rx="6" fill="#27ae60"/>
  <text x="60" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Step</text>
  <text x="180" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Code Line</text>
  <text x="380" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">q (front &#x2192; back)</text>
  <text x="540" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">visited</text>
  <text x="680" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">current</text>
  <text x="780" y="264" text-anchor="middle" fill="white" font-size="10" font-weight="bold">result</text>

  <!-- Step 0: Seed -->
  <rect x="30" y="276" width="800" height="36" fill="#f0faf0"/>
  <text x="60" y="298" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">0</text>
  <text x="180" y="292" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">q.push("A")</text>
  <text x="180" y="304" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">visited.insert("A")</text>
  <text x="380" y="298" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">[A]</text>
  <text x="540" y="298" text-anchor="middle" fill="#555" font-size="10">{A}</text>
  <text x="680" y="298" text-anchor="middle" fill="#bbb" font-size="10">&#x2014;</text>
  <text x="780" y="298" text-anchor="middle" fill="#bbb" font-size="10">[ ]</text>

  <!-- Step 1: Dequeue A -->
  <rect x="30" y="316" width="800" height="50" fill="white"/>
  <text x="60" y="344" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">1</text>
  <text x="180" y="334" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">current = q.front() <tspan fill="#27ae60">"A"</tspan></text>
  <text x="180" y="346" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">result.push_back("A")</text>
  <text x="180" y="358" text-anchor="middle" fill="#888" font-size="9">neighbors of A: [B, C] &#x2192; push both</text>
  <text x="380" y="344" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">[B, C]</text>
  <text x="540" y="344" text-anchor="middle" fill="#555" font-size="10">{A, B, C}</text>
  <text x="680" y="344" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">A</text>
  <text x="780" y="344" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">[A]</text>

  <!-- Step 2: Dequeue B -->
  <rect x="30" y="370" width="800" height="50" fill="#f0faf0"/>
  <text x="60" y="398" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">2</text>
  <text x="180" y="388" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">current = q.front() <tspan fill="#2980b9">"B"</tspan></text>
  <text x="180" y="400" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">result.push_back("B")</text>
  <text x="180" y="412" text-anchor="middle" fill="#888" font-size="9">neighbors of B: [A,D,E] &#x2192; A visited, push D,E</text>
  <text x="380" y="398" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">[C, D, E]</text>
  <text x="540" y="398" text-anchor="middle" fill="#555" font-size="10">{A, B, C, D, E}</text>
  <text x="680" y="398" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">B</text>
  <text x="780" y="398" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">[A, B]</text>

  <!-- Step 3: Dequeue C -->
  <rect x="30" y="424" width="800" height="50" fill="white"/>
  <text x="60" y="452" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">3</text>
  <text x="180" y="442" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">current = q.front() <tspan fill="#2980b9">"C"</tspan></text>
  <text x="180" y="454" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">result.push_back("C")</text>
  <text x="180" y="466" text-anchor="middle" fill="#888" font-size="9">neighbors of C: [A,E] &#x2192; both visited, push none</text>
  <text x="380" y="452" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">[D, E]</text>
  <text x="540" y="452" text-anchor="middle" fill="#555" font-size="10">{A, B, C, D, E}</text>
  <text x="680" y="452" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">C</text>
  <text x="780" y="452" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">[A, B, C]</text>

  <!-- Step 4: Dequeue D -->
  <rect x="30" y="478" width="800" height="50" fill="#f0faf0"/>
  <text x="60" y="506" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">4</text>
  <text x="180" y="496" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">current = q.front() <tspan fill="#8e44ad">"D"</tspan></text>
  <text x="180" y="508" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">result.push_back("D")</text>
  <text x="180" y="520" text-anchor="middle" fill="#888" font-size="9">neighbors of D: [B] &#x2192; B visited, push none</text>
  <text x="380" y="506" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">[E]</text>
  <text x="540" y="506" text-anchor="middle" fill="#555" font-size="10">{A, B, C, D, E}</text>
  <text x="680" y="506" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">D</text>
  <text x="780" y="506" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">[A,B,C,D]</text>

  <!-- Step 5: Dequeue E -->
  <rect x="30" y="532" width="800" height="50" fill="white"/>
  <text x="60" y="560" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">5</text>
  <text x="180" y="550" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">current = q.front() <tspan fill="#8e44ad">"E"</tspan></text>
  <text x="180" y="562" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">result.push_back("E")</text>
  <text x="180" y="574" text-anchor="middle" fill="#888" font-size="9">neighbors of E: [B,C] &#x2192; both visited, push none</text>
  <text x="380" y="560" text-anchor="middle" fill="#bbb" font-size="11">empty</text>
  <text x="540" y="560" text-anchor="middle" fill="#555" font-size="10">{A, B, C, D, E}</text>
  <text x="680" y="560" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">E</text>
  <text x="780" y="560" text-anchor="middle" fill="#8e44ad" font-size="11" font-weight="bold">[A,B,C,D,E]</text>

  <!-- Done -->
  <rect x="30" y="586" width="800" height="30" fill="#f0faf0"/>
  <text x="60" y="606" text-anchor="middle" fill="#555" font-size="11" font-weight="bold">&#x2713;</text>
  <text x="180" y="606" text-anchor="middle" fill="#555" font-size="10" font-family="Consolas, monospace">q.empty() &#x2192; exit loop</text>
  <text x="780" y="606" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">[A,B,C,D,E]</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="626" width="800" height="44" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="644" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Visit order: A &#x2192; B, C &#x2192; D, E (level by level, distance 0, 1, 2)</text>
  <text x="430" y="662" text-anchor="middle" fill="#555" font-size="11">Every vertex enters the queue exactly once because we mark visited at push time.</text>
</svg>