<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Section 1, Step 1: add_edge("Alice", "Bob")</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">First edge &#x2014; creates both vertices and links them</text>

  <!-- What happens -->
  <rect x="30" y="65" width="420" height="180" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="50" y="88" fill="#2c3e50" font-size="12" font-family="Consolas, monospace">g.add_edge(<tspan fill="#2980b9">"Alice"</tspan>, <tspan fill="#2980b9">"Bob"</tspan>);</text>
  <text x="240" y="108" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">What Happens Inside</text>

  <circle cx="55" cy="132" r="8" fill="#27ae60"/>
  <text x="55" y="136" text-anchor="middle" fill="white" font-size="9" font-weight="bold">1</text>
  <text x="75" y="136" fill="#2c3e50" font-size="11">Alice doesn't exist &#x2192; <tspan font-weight="bold">create key "Alice"</tspan> with empty list</text>

  <circle cx="55" cy="158" r="8" fill="#27ae60"/>
  <text x="55" y="162" text-anchor="middle" fill="white" font-size="9" font-weight="bold">2</text>
  <text x="75" y="162" fill="#2c3e50" font-size="11">Bob doesn't exist &#x2192; <tspan font-weight="bold">create key "Bob"</tspan> with empty list</text>

  <circle cx="55" cy="184" r="8" fill="#27ae60"/>
  <text x="55" y="188" text-anchor="middle" fill="white" font-size="9" font-weight="bold">3</text>
  <text x="75" y="188" fill="#2c3e50" font-size="11">Add <tspan font-weight="bold" fill="#2980b9">"Bob"</tspan> to Alice's neighbor list</text>

  <circle cx="55" cy="210" r="8" fill="#27ae60"/>
  <text x="55" y="214" text-anchor="middle" fill="white" font-size="9" font-weight="bold">4</text>
  <text x="75" y="214" fill="#2c3e50" font-size="11">Add <tspan font-weight="bold" fill="#2980b9">"Alice"</tspan> to Bob's neighbor list (undirected!)</text>

  <!-- Resulting map -->
  <rect x="470" y="65" width="400" height="160" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="670" y="88" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">adj_list_ After Step 1</text>

  <rect x="500" y="105" width="55" height="28" rx="5" fill="#27ae60"/>
  <text x="527" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Alice</text>
  <text x="568" y="124" fill="#999" font-size="13">&#x2192;</text>
  <rect x="588" y="108" width="45" height="22" rx="4" fill="white" stroke="#2980b9" stroke-width="1.2"/>
  <text x="610" y="124" text-anchor="middle" fill="#2c3e50" font-size="11">Bob</text>

  <rect x="500" y="145" width="55" height="28" rx="5" fill="#27ae60"/>
  <text x="527" y="164" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Bob</text>
  <text x="568" y="164" fill="#999" font-size="13">&#x2192;</text>
  <rect x="588" y="148" width="50" height="22" rx="4" fill="white" stroke="#2980b9" stroke-width="1.2"/>
  <text x="613" y="164" text-anchor="middle" fill="#2c3e50" font-size="11">Alice</text>

  <!-- Mini graph -->
  <circle cx="720" cy="135" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="720" y="140" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Alice</text>
  <line x1="720" y1="153" x2="720" y2="167" stroke="#2980b9" stroke-width="2"/>
  <circle cx="720" cy="185" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="720" y="190" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Bob</text>

  <!-- Stats -->
  <rect x="30" y="260" width="840" height="65" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1.2"/>
  <text x="150" y="288" text-anchor="middle" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Vertices:</tspan> 2</text>
  <text x="350" y="288" text-anchor="middle" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Edges:</tspan> 1</text>
  <text x="600" y="288" text-anchor="middle" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Total map entries:</tspan> 2 (each edge stored twice)</text>
  <text x="450" y="312" text-anchor="middle" fill="#777" font-size="11">add_edge called add_vertex for both Alice and Bob automatically</text>
</svg>
