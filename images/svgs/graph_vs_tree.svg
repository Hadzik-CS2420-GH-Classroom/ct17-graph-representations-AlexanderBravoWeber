<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 630" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Graph vs Tree</text>

  <!-- ===== TREE SIDE ===== -->
  <rect x="30" y="50" width="400" height="410" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="230" y="78" text-anchor="middle" fill="#27ae60" font-size="15" font-weight="bold">Tree</text>

  <!-- Tree nodes -->
  <circle cx="230" cy="115" r="20" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="230" y="121" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">A</text>

  <circle cx="160" cy="185" r="20" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="160" y="191" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">B</text>

  <circle cx="300" cy="185" r="20" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="300" y="191" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">C</text>

  <circle cx="120" cy="250" r="20" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="120" y="256" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">D</text>

  <circle cx="200" cy="250" r="20" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="200" y="256" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">E</text>

  <!-- Tree edges -->
  <line x1="230" y1="135" x2="160" y2="165" stroke="#27ae60" stroke-width="2"/>
  <line x1="230" y1="135" x2="300" y2="165" stroke="#27ae60" stroke-width="2"/>
  <line x1="160" y1="205" x2="120" y2="230" stroke="#27ae60" stroke-width="2"/>
  <line x1="160" y1="205" x2="200" y2="230" stroke="#27ae60" stroke-width="2"/>

  <!-- Tree properties -->
  <text x="230" y="295" text-anchor="middle" fill="#555" font-size="12">One root, no cycles, exactly one path</text>
  <text x="230" y="311" text-anchor="middle" fill="#555" font-size="12">between any two nodes</text>

  <!-- Tree use cases -->
  <line x1="60" y1="330" x2="400" y2="330" stroke="#ddd" stroke-width="1"/>
  <text x="230" y="350" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Common Uses</text>
  <circle cx="68" cy="372" r="3" fill="#27ae60"/>
  <text x="80" y="377" fill="#2c3e50" font-size="12">File systems (folders/files)</text>
  <circle cx="68" cy="395" r="3" fill="#27ae60"/>
  <text x="80" y="400" fill="#2c3e50" font-size="12">HTML DOM (parent/child elements)</text>
  <circle cx="68" cy="418" r="3" fill="#27ae60"/>
  <text x="80" y="423" fill="#2c3e50" font-size="12">BST, AVL &#x2014; fast search O(log n)</text>
  <circle cx="68" cy="441" r="3" fill="#27ae60"/>
  <text x="80" y="446" fill="#2c3e50" font-size="12">Decision trees, org charts</text>

  <!-- ===== GRAPH SIDE ===== -->
  <rect x="470" y="50" width="400" height="410" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="670" y="78" text-anchor="middle" fill="#2980b9" font-size="15" font-weight="bold">Graph</text>

  <!-- Graph nodes -->
  <circle cx="600" cy="115" r="20" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="600" y="121" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">A</text>

  <circle cx="740" cy="115" r="20" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="740" y="121" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">B</text>

  <circle cx="540" cy="200" r="20" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="540" y="206" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">C</text>

  <circle cx="670" cy="210" r="20" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="670" y="216" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">D</text>

  <circle cx="800" cy="200" r="20" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="800" y="206" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">E</text>

  <!-- Graph edges -->
  <line x1="620" y1="115" x2="720" y2="115" stroke="#2980b9" stroke-width="2"/>
  <line x1="590" y1="132" x2="550" y2="183" stroke="#2980b9" stroke-width="2"/>
  <line x1="610" y1="132" x2="660" y2="193" stroke="#2980b9" stroke-width="2"/>
  <line x1="756" y1="127" x2="786" y2="184" stroke="#2980b9" stroke-width="2"/>
  <line x1="726" y1="130" x2="684" y2="195" stroke="#2980b9" stroke-width="2"/>
  <line x1="560" y1="200" x2="650" y2="210" stroke="#2980b9" stroke-width="2"/>

  <!-- Cycle highlight: A → B → D → A -->
  <path d="M 618,125 L 722,125 L 670,193 Z" fill="#c0392b" fill-opacity="0.06" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="670" y="142" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">cycle!</text>
  <text x="670" y="155" text-anchor="middle" fill="#c0392b" font-size="10">A&#x2192;B&#x2192;D&#x2192;A</text>

  <!-- Edge label on B-E -->
  <text x="790" y="148" fill="#e67e22" font-size="10" font-weight="bold">edge</text>
  <path d="M 786,150 L 775,160" fill="none" stroke="#e67e22" stroke-width="1.2"/>

  <!-- Graph properties -->
  <text x="670" y="255" text-anchor="middle" fill="#555" font-size="12">No root, cycles allowed, multiple paths</text>

  <!-- Graph use cases -->
  <line x1="500" y1="330" x2="840" y2="330" stroke="#ddd" stroke-width="1"/>
  <text x="670" y="350" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">Common Uses</text>
  <circle cx="508" cy="372" r="3" fill="#2980b9"/>
  <text x="520" y="377" fill="#2c3e50" font-size="12">Social networks (friends, followers)</text>
  <circle cx="508" cy="395" r="3" fill="#2980b9"/>
  <text x="520" y="400" fill="#2c3e50" font-size="12">Maps / GPS navigation (roads, routes)</text>
  <circle cx="508" cy="418" r="3" fill="#2980b9"/>
  <text x="520" y="423" fill="#2c3e50" font-size="12">Web links (pages linking to pages)</text>
  <circle cx="508" cy="441" r="3" fill="#2980b9"/>
  <text x="520" y="446" fill="#2c3e50" font-size="12">Network routing, dependency resolution</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="475" width="840" height="130" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="450" y="498" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Key Terms</text>

  <!-- Vertex -->
  <circle cx="70" cy="522" r="10" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="90" y="527" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Vertex</tspan> &#x2014; a data point in the graph (called "node" in trees &#x2014; same concept)</text>

  <!-- Edge -->
  <line x1="55" y1="547" x2="85" y2="547" stroke="#2980b9" stroke-width="2.5"/>
  <text x="90" y="552" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Edge</tspan> &#x2014; a connection between two vertices</text>

  <!-- Degree -->
  <text x="60" y="577" fill="#2980b9" font-size="14" font-weight="bold">3</text>
  <text x="90" y="577" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Degree</tspan> &#x2014; number of edges on a vertex (no limit in a graph)</text>

  <!-- Cycle -->
  <line x1="510" y1="517" x2="540" y2="517" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="550" y="522" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Cycle</tspan> &#x2014; a path that starts and ends at the same vertex</text>

  <!-- Acyclic -->
  <circle cx="520" cy="547" r="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="533" y="551" fill="#27ae60" font-size="11" font-weight="bold">&#x2713;</text>
  <text x="550" y="552" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Acyclic</tspan> &#x2014; no cycles (trees are always acyclic)</text>

  <!-- Undirected -->
  <line x1="510" y1="572" x2="540" y2="572" stroke="#8e44ad" stroke-width="2.5"/>
  <text x="550" y="577" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Undirected</tspan> &#x2014; edges go both ways (A&#x2014;B means B&#x2014;A too)</text>

  <!-- Bottom note -->
  <text x="450" y="620" text-anchor="middle" fill="#e67e22" font-size="13" font-weight="bold">A tree is a special case of a graph &#x2014; connected, acyclic (no cycles), one root</text>
</svg>
