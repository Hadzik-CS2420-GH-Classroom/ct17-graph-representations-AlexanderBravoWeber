<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 605" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">DFS &#x2014; Depth-First Search</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="13">Dive as deep as possible using a STACK (LIFO)</text>

  <!-- ===== GRAPH + VISIT ORDER ===== -->
  <rect x="30" y="65" width="420" height="310" rx="10" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" fill="#c0392b" font-size="14" font-weight="bold">Visit Order (starting from A)</text>

  <!-- Nodes -->
  <circle cx="240" cy="130" r="22" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="2.5"/>
  <text x="240" y="136" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">A</text>
  <text x="285" y="130" fill="#27ae60" font-size="11" font-weight="bold">1st</text>

  <circle cx="160" cy="200" r="22" fill="#c0392b" fill-opacity="0.12" stroke="#c0392b" stroke-width="2"/>
  <text x="160" y="206" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">B</text>
  <text x="115" y="200" fill="#c0392b" font-size="11" font-weight="bold">2nd</text>

  <circle cx="320" cy="200" r="22" fill="#999" fill-opacity="0.1" stroke="#999" stroke-width="2"/>
  <text x="320" y="206" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">C</text>
  <text x="360" y="200" fill="#999" font-size="11">5th</text>

  <circle cx="110" cy="275" r="22" fill="#c0392b" fill-opacity="0.12" stroke="#c0392b" stroke-width="2"/>
  <text x="110" y="281" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">D</text>
  <text x="68" y="275" fill="#c0392b" font-size="11" font-weight="bold">3rd</text>

  <circle cx="240" cy="275" r="22" fill="#999" fill-opacity="0.1" stroke="#999" stroke-width="2"/>
  <text x="240" y="281" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">E</text>
  <text x="280" y="275" fill="#999" font-size="11">4th</text>

  <!-- Edges -->
  <line x1="226" y1="149" x2="174" y2="182" stroke="#bbb" stroke-width="1.5"/>
  <line x1="254" y1="149" x2="306" y2="182" stroke="#bbb" stroke-width="1.5"/>
  <line x1="146" y1="218" x2="124" y2="257" stroke="#bbb" stroke-width="1.5"/>
  <line x1="174" y1="218" x2="226" y2="257" stroke="#bbb" stroke-width="1.5"/>
  <line x1="306" y1="218" x2="254" y2="257" stroke="#bbb" stroke-width="1.5"/>

  <!-- DFS dive path -->
  <path d="M 226,149 L 174,182 L 124,257" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="55" y="308" fill="#c0392b" font-size="10" font-weight="bold">dives deep first!</text>

  <!-- Result bar -->
  <rect x="55" y="320" width="370" height="26" rx="5" fill="#f5f5f5" stroke="#ddd"/>
  <text x="65" y="338" fill="#777" font-size="11">Order:</text>
  <text x="115" y="338" fill="#27ae60" font-size="12" font-weight="bold">A</text>
  <text x="138" y="338" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="155" y="338" fill="#c0392b" font-size="12" font-weight="bold">B</text>
  <text x="178" y="338" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="195" y="338" fill="#c0392b" font-size="12" font-weight="bold">D</text>
  <text x="218" y="338" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="235" y="338" fill="#999" font-size="12" font-weight="bold">E</text>
  <text x="258" y="338" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="275" y="338" fill="#999" font-size="12" font-weight="bold">C</text>

  <!-- ===== ALGORITHM ===== -->
  <rect x="470" y="65" width="400" height="310" rx="10" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="670" y="90" text-anchor="middle" fill="#c0392b" font-size="14" font-weight="bold">The Algorithm</text>

  <!-- Steps -->
  <circle cx="495" cy="115" r="10" fill="#c0392b"/>
  <text x="495" y="119" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
  <text x="515" y="119" fill="#2c3e50" font-size="12">Create a <tspan font-weight="bold">stack</tspan> and a <tspan font-weight="bold">visited set</tspan></text>

  <circle cx="495" cy="145" r="10" fill="#c0392b"/>
  <text x="495" y="149" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
  <text x="515" y="149" fill="#2c3e50" font-size="12">Push the <tspan font-weight="bold">start vertex</tspan> onto the stack</text>

  <circle cx="495" cy="175" r="10" fill="#c0392b"/>
  <text x="495" y="179" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
  <text x="515" y="179" fill="#2c3e50" font-size="12">While stack is not empty:</text>

  <text x="535" y="200" fill="#555" font-size="11">a. <tspan font-weight="bold">Pop</tspan> the top vertex</text>
  <text x="535" y="218" fill="#555" font-size="11">b. If already visited, <tspan font-weight="bold">skip it</tspan></text>
  <text x="535" y="236" fill="#555" font-size="11">c. Mark it <tspan font-weight="bold">visited</tspan>, add to <tspan font-weight="bold">result</tspan></text>
  <text x="535" y="254" fill="#555" font-size="11">d. Push all <tspan font-weight="bold">unvisited neighbors</tspan></text>

  <!-- Stack visual -->
  <text x="670" y="282" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">Stack (LIFO): last in, first out</text>
  <rect x="590" y="290" width="45" height="25" rx="4" fill="white" stroke="#c0392b" stroke-width="1.5"/>
  <text x="612" y="307" text-anchor="middle" fill="#2c3e50" font-size="10">D</text>
  <rect x="640" y="290" width="45" height="25" rx="4" fill="white" stroke="#c0392b" stroke-width="1.5"/>
  <text x="662" y="307" text-anchor="middle" fill="#2c3e50" font-size="10">E</text>
  <rect x="690" y="290" width="45" height="25" rx="4" fill="#eee" stroke="#bbb" stroke-width="1"/>
  <text x="712" y="307" text-anchor="middle" fill="#bbb" font-size="10">...</text>
  <text x="590" y="332" fill="#c0392b" font-size="10" font-weight="bold">top (next out) &#x2190;</text>

  <!-- ===== KEY PROPERTIES ===== -->
  <rect x="30" y="390" width="840" height="100" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="450" y="415" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Key Properties</text>

  <circle cx="60" cy="440" r="3" fill="#c0392b"/>
  <text x="75" y="444" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Explores one branch completely</tspan> before backtracking to try another</text>

  <circle cx="60" cy="463" r="3" fill="#c0392b"/>
  <text x="75" y="467" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Time:</tspan> O(V + E) &#x2014; same as BFS, visits every vertex and edge once</text>

  <circle cx="60" cy="478" r="3" fill="#c0392b"/>
  <text x="75" y="482" fill="#2c3e50" font-size="12"><tspan font-weight="bold">Space:</tspan> O(V) &#x2014; stack + visited set can hold all vertices</text>

  <!-- ===== WHEN TO USE ===== -->
  <rect x="30" y="505" width="840" height="90" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="1.2"/>
  <text x="450" y="530" text-anchor="middle" fill="#e67e22" font-size="14" font-weight="bold">When to Use DFS</text>

  <circle cx="60" cy="552" r="3" fill="#e67e22"/>
  <text x="75" y="556" fill="#2c3e50" font-size="12">"Is there a path from X to Y?" &#x2014; maze solving, reachability</text>

  <circle cx="60" cy="575" r="3" fill="#e67e22"/>
  <text x="75" y="579" fill="#2c3e50" font-size="12">"Does this graph have a cycle?" &#x2014; cycle detection, topological sort, dependency checking</text>
</svg>
