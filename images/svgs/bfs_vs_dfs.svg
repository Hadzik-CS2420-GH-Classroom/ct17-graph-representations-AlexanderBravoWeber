<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">BFS vs DFS &#x2014; Two Ways to Explore a Graph</text>

  <!-- ===== BFS SIDE ===== -->
  <rect x="30" y="50" width="410" height="320" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="235" y="78" text-anchor="middle" fill="#27ae60" font-size="15" font-weight="bold">BFS &#x2014; Breadth-First Search</text>
  <text x="235" y="96" text-anchor="middle" fill="#777" font-size="11">Uses a QUEUE (FIFO) &#x2014; level by level</text>

  <!-- Level 0 -->
  <circle cx="235" cy="138" r="20" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="2.5"/>
  <text x="235" y="144" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">A</text>
  <text x="280" y="138" fill="#27ae60" font-size="11" font-weight="bold">1st</text>

  <!-- Level 1 -->
  <circle cx="165" cy="205" r="20" fill="#2980b9" fill-opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="165" y="211" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">B</text>
  <text x="120" y="205" fill="#2980b9" font-size="11" font-weight="bold">2nd</text>

  <circle cx="305" cy="205" r="20" fill="#2980b9" fill-opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="305" y="211" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">C</text>
  <text x="348" y="205" fill="#2980b9" font-size="11" font-weight="bold">3rd</text>

  <!-- Level 2 -->
  <circle cx="130" cy="272" r="20" fill="#8e44ad" fill-opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="130" y="278" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">D</text>
  <text x="88" y="272" fill="#8e44ad" font-size="11" font-weight="bold">4th</text>

  <circle cx="235" cy="272" r="20" fill="#8e44ad" fill-opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="235" y="278" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">E</text>
  <text x="278" y="272" fill="#8e44ad" font-size="11" font-weight="bold">5th</text>

  <!-- BFS edges -->
  <line x1="222" y1="155" x2="178" y2="188" stroke="#bbb" stroke-width="1.5"/>
  <line x1="248" y1="155" x2="292" y2="188" stroke="#bbb" stroke-width="1.5"/>
  <line x1="152" y1="222" x2="143" y2="255" stroke="#bbb" stroke-width="1.5"/>
  <line x1="178" y1="222" x2="222" y2="255" stroke="#bbb" stroke-width="1.5"/>
  <line x1="292" y1="222" x2="248" y2="255" stroke="#bbb" stroke-width="1.5"/>

  <!-- Level brackets -->
  <text x="385" y="138" fill="#27ae60" font-size="10">dist 0</text>
  <text x="385" y="205" fill="#2980b9" font-size="10">dist 1</text>
  <text x="385" y="272" fill="#8e44ad" font-size="10">dist 2</text>

  <!-- BFS result -->
  <rect x="55" y="302" width="360" height="26" rx="5" fill="#f5f5f5" stroke="#ddd"/>
  <text x="65" y="320" fill="#777" font-size="11">Order:</text>
  <text x="115" y="320" fill="#27ae60" font-size="12" font-weight="bold">A</text>
  <text x="140" y="320" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="160" y="320" fill="#2980b9" font-size="12" font-weight="bold">B</text>
  <text x="185" y="320" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="205" y="320" fill="#2980b9" font-size="12" font-weight="bold">C</text>
  <text x="230" y="320" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="250" y="320" fill="#8e44ad" font-size="12" font-weight="bold">D</text>
  <text x="275" y="320" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="295" y="320" fill="#8e44ad" font-size="12" font-weight="bold">E</text>

  <text x="235" y="355" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Finds shortest path (unweighted)</text>
  <text x="235" y="370" text-anchor="middle" fill="#777" font-size="11">"How far is X from Y?"</text>

  <!-- ===== DFS SIDE ===== -->
  <rect x="460" y="50" width="410" height="320" rx="10" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="665" y="78" text-anchor="middle" fill="#c0392b" font-size="15" font-weight="bold">DFS &#x2014; Depth-First Search</text>
  <text x="665" y="96" text-anchor="middle" fill="#777" font-size="11">Uses a STACK (LIFO) &#x2014; dive deep first</text>

  <!-- DFS nodes -->
  <circle cx="665" cy="138" r="20" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="2.5"/>
  <text x="665" y="144" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">A</text>
  <text x="710" y="138" fill="#27ae60" font-size="11" font-weight="bold">1st</text>

  <circle cx="595" cy="205" r="20" fill="#c0392b" fill-opacity="0.12" stroke="#c0392b" stroke-width="2"/>
  <text x="595" y="211" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">B</text>
  <text x="553" y="205" fill="#c0392b" font-size="11" font-weight="bold">2nd</text>

  <circle cx="735" cy="205" r="20" fill="#999" fill-opacity="0.1" stroke="#999" stroke-width="2"/>
  <text x="735" y="211" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">C</text>
  <text x="778" y="205" fill="#999" font-size="11">5th</text>

  <circle cx="560" cy="272" r="20" fill="#c0392b" fill-opacity="0.12" stroke="#c0392b" stroke-width="2"/>
  <text x="560" y="278" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">D</text>
  <text x="518" y="272" fill="#c0392b" font-size="11" font-weight="bold">3rd</text>

  <circle cx="665" cy="272" r="20" fill="#999" fill-opacity="0.1" stroke="#999" stroke-width="2"/>
  <text x="665" y="278" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">E</text>
  <text x="708" y="272" fill="#999" font-size="11">4th</text>

  <!-- DFS edges -->
  <line x1="652" y1="155" x2="608" y2="188" stroke="#bbb" stroke-width="1.5"/>
  <line x1="678" y1="155" x2="722" y2="188" stroke="#bbb" stroke-width="1.5"/>
  <line x1="582" y1="222" x2="573" y2="255" stroke="#bbb" stroke-width="1.5"/>
  <line x1="608" y1="222" x2="652" y2="255" stroke="#bbb" stroke-width="1.5"/>
  <line x1="722" y1="222" x2="678" y2="255" stroke="#bbb" stroke-width="1.5"/>

  <!-- DFS dive path -->
  <path d="M 652,155 L 608,188 L 573,255" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- DFS result -->
  <rect x="485" y="302" width="360" height="26" rx="5" fill="#f5f5f5" stroke="#ddd"/>
  <text x="495" y="320" fill="#777" font-size="11">Order:</text>
  <text x="545" y="320" fill="#27ae60" font-size="12" font-weight="bold">A</text>
  <text x="570" y="320" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="590" y="320" fill="#c0392b" font-size="12" font-weight="bold">B</text>
  <text x="615" y="320" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="635" y="320" fill="#c0392b" font-size="12" font-weight="bold">D</text>
  <text x="660" y="320" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="680" y="320" fill="#999" font-size="12" font-weight="bold">E</text>
  <text x="705" y="320" fill="#bbb" font-size="11">&#x2192;</text>
  <text x="725" y="320" fill="#999" font-size="12" font-weight="bold">C</text>

  <text x="665" y="355" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="bold">Explores one path completely first</text>
  <text x="665" y="370" text-anchor="middle" fill="#777" font-size="11">"Is there a path? Cycle detection, maze solving"</text>

  <!-- Bottom shared note -->
  <text x="450" y="395" text-anchor="middle" fill="#e67e22" font-size="13" font-weight="bold">Both are O(V + E) &#x2014; visit every vertex and edge exactly once</text>
</svg>
