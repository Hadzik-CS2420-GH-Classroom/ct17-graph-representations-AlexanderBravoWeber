<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 575" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Queries: Asking Questions About the Graph</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="13">None of these modify the graph &#x2014; they only read from adj_list_</text>

  <!-- Reference graph -->
  <rect x="30" y="65" width="260" height="200" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="160" y="88" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">Our Graph</text>

  <circle cx="160" cy="118" r="16" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="160" y="123" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Alice</text>

  <circle cx="90" cy="180" r="16" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="90" y="185" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Bob</text>

  <circle cx="230" cy="180" r="16" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="230" y="185" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Carol</text>

  <circle cx="60" cy="240" r="16" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="60" y="245" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Dave</text>

  <circle cx="160" cy="240" r="16" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="160" y="245" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Eve</text>

  <line x1="150" y1="133" x2="100" y2="167" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="170" y1="133" x2="220" y2="167" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="80" y1="195" x2="70" y2="226" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="100" y1="194" x2="150" y2="226" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="220" y1="194" x2="170" y2="226" stroke="#2980b9" stroke-width="1.5"/>

  <!-- ========== SECTION 1: Does it exist? ========== -->
  <text x="310" y="72" fill="#27ae60" font-size="12" font-weight="bold">Does it exist?</text>
  <line x1="410" y1="68" x2="870" y2="68" stroke="#ddd" stroke-width="1"/>

  <!-- has_vertex true -->
  <rect x="310" y="82" width="270" height="70" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="325" y="102" fill="#27ae60" font-size="13" font-weight="bold" font-family="Consolas, monospace">has_vertex("Alice")</text>
  <text x="325" y="118" fill="#555" font-size="11">Is "Alice" a key in the map?</text>
  <text x="325" y="137" fill="#27ae60" font-size="12" font-weight="bold">&#x2192; true</text>
  <text x="380" y="137" fill="#777" font-size="11">(O(1) &#x2014; hash lookup)</text>

  <!-- has_vertex false -->
  <rect x="600" y="82" width="270" height="70" rx="8" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="615" y="102" fill="#c0392b" font-size="13" font-weight="bold" font-family="Consolas, monospace">has_vertex("Frank")</text>
  <text x="615" y="118" fill="#555" font-size="11">Is "Frank" a key in the map?</text>
  <text x="615" y="137" fill="#c0392b" font-size="12" font-weight="bold">&#x2192; false</text>
  <text x="680" y="137" fill="#777" font-size="11">(not found)</text>

  <!-- has_edge true -->
  <rect x="310" y="162" width="270" height="70" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="325" y="182" fill="#27ae60" font-size="13" font-weight="bold" font-family="Consolas, monospace">has_edge("Alice","Bob")</text>
  <text x="325" y="198" fill="#555" font-size="11">Is "Bob" in Alice's neighbor list?</text>
  <text x="325" y="217" fill="#27ae60" font-size="12" font-weight="bold">&#x2192; true</text>
  <text x="380" y="217" fill="#777" font-size="11">(O(degree) &#x2014; scan the vector)</text>

  <!-- has_edge false -->
  <rect x="600" y="162" width="270" height="70" rx="8" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="615" y="182" fill="#c0392b" font-size="13" font-weight="bold" font-family="Consolas, monospace">has_edge("Alice","Dave")</text>
  <text x="615" y="198" fill="#555" font-size="11">Is "Dave" in Alice's neighbor list?</text>
  <text x="615" y="217" fill="#c0392b" font-size="12" font-weight="bold">&#x2192; false</text>
  <text x="680" y="217" fill="#777" font-size="11">(Alice only has Bob, Carol)</text>

  <!-- ========== SECTION 2: How many? ========== -->
  <text x="310" y="258" fill="#2980b9" font-size="12" font-weight="bold">How many?</text>
  <line x1="385" y1="254" x2="870" y2="254" stroke="#ddd" stroke-width="1"/>

  <!-- vertex_count -->
  <rect x="310" y="268" width="270" height="70" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="325" y="288" fill="#2980b9" font-size="13" font-weight="bold" font-family="Consolas, monospace">vertex_count()</text>
  <text x="325" y="304" fill="#555" font-size="11">How many keys in the map?</text>
  <text x="325" y="323" fill="#2980b9" font-size="12" font-weight="bold">&#x2192; 5</text>
  <text x="355" y="323" fill="#777" font-size="11">(adj_list_.size())</text>

  <!-- edge_count -->
  <rect x="600" y="268" width="270" height="70" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="615" y="288" fill="#2980b9" font-size="13" font-weight="bold" font-family="Consolas, monospace">edge_count()</text>
  <text x="615" y="304" fill="#555" font-size="11">Sum all neighbor list sizes, divide by 2</text>
  <text x="615" y="323" fill="#2980b9" font-size="12" font-weight="bold">&#x2192; 5</text>
  <text x="645" y="323" fill="#777" font-size="11">(10 entries / 2 = 5 edges)</text>

  <!-- ========== SECTION 3: What's connected? ========== -->
  <text x="310" y="363" fill="#8e44ad" font-size="12" font-weight="bold">What's connected?</text>
  <line x1="450" y1="359" x2="870" y2="359" stroke="#ddd" stroke-width="1"/>

  <!-- neighbors -->
  <rect x="310" y="373" width="560" height="70" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="325" y="393" fill="#8e44ad" font-size="13" font-weight="bold" font-family="Consolas, monospace">neighbors("Bob")</text>
  <text x="325" y="409" fill="#555" font-size="11">Return Bob's neighbor list from the map</text>
  <text x="325" y="428" fill="#8e44ad" font-size="12" font-weight="bold">&#x2192; {"Alice", "Dave", "Eve"}</text>
  <text x="555" y="428" fill="#777" font-size="11">(the vector stored at key "Bob")</text>

  <!-- ========== BOTTOM: Why divide by 2 ========== -->
  <rect x="30" y="460" width="840" height="55" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="1.2"/>
  <text x="450" y="478" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">Why divide by 2 for edge_count?</text>
  <text x="450" y="494" text-anchor="middle" fill="#555" font-size="11">add_edge("A","B") stores B in A's list <tspan font-weight="bold">and</tspan> A in B's list &#x2014; one edge, two entries.</text>
  <text x="450" y="508" text-anchor="middle" fill="#555" font-size="11">So total neighbor entries across all vertices = 2 &#xD7; actual edges. Divide by 2 to get the real count.</text>

  <!-- ========== BOTTOM: Big O summary ========== -->
  <rect x="30" y="525" width="840" height="40" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1.2"/>
  <text x="170" y="550" text-anchor="middle" fill="#2c3e50" font-size="11"><tspan font-weight="bold">has_vertex:</tspan> O(1)</text>
  <text x="380" y="550" text-anchor="middle" fill="#2c3e50" font-size="11"><tspan font-weight="bold">has_edge:</tspan> O(degree)</text>
  <text x="580" y="550" text-anchor="middle" fill="#2c3e50" font-size="11"><tspan font-weight="bold">vertex/edge_count:</tspan> O(V)</text>
  <text x="770" y="550" text-anchor="middle" fill="#2c3e50" font-size="11"><tspan font-weight="bold">neighbors:</tspan> O(degree)</text>
</svg>
