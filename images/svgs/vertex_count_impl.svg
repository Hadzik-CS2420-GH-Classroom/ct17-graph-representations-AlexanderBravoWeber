<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">vertex_count() &#x2014; Map Size</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Each vertex is a key in the unordered_map &#x2014; just return the map's size</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- Row backgrounds -->
  <rect x="20" y="78" width="820" height="56" fill="#f9f9f9"/>
  <rect x="20" y="134" width="820" height="56" fill="white"/>

  <!-- ===== ROW 1: Signature ===== -->
  <rect x="30" y="90" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="108" fill="#569cd6">int</tspan><tspan fill="#dcdcaa"> vertex_count</tspan><tspan fill="#ddd">() </tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> {</tspan>
  </text>

  <line x1="410" y1="103" x2="458" y2="103" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,99 466,103 458,107" fill="#bdc3c7"/>

  <text x="476" y="102" font-size="11" fill="#555">Returns the number of vertices in the graph.</text>

  <!-- ===== ROW 2: Return size ===== -->
  <rect x="30" y="146" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="164" fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#dcdcaa">static_cast</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt;(</tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">size</tspan><tspan fill="#ddd">());</tspan>
  </text>

  <line x1="410" y1="159" x2="458" y2="159" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,155 466,159 458,163" fill="#bdc3c7"/>

  <text x="476" y="154" font-size="11" fill="#555">The map has one entry per vertex. <tspan font-family="Consolas, monospace" font-size="10">size()</tspan></text>
  <text x="476" y="170" font-size="11" fill="#555">returns the count directly &#x2014; <tspan font-weight="bold">O(1)</tspan>, no traversal.</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="200" width="800" height="48" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="220" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">O(1) &#x2014; the map tracks its own size internally.</text>
  <text x="430" y="238" text-anchor="middle" fill="#888" font-size="11">static_cast&lt;int&gt; converts size_t (unsigned) to int to match our return type.</text>
</svg>