<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Modifiers: add_vertex() and add_edge()</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="13">How the adjacency list grows as we build a graph</text>

  <!-- ===== STEP 1: add_vertex("A") ===== -->
  <rect x="30" y="65" width="260" height="135" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="160" y="88" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold" font-family="Consolas, monospace">add_vertex("A")</text>
  <text x="160" y="106" text-anchor="middle" fill="#777" font-size="11">Insert key with empty list (rare &#x2014;</text>
  <text x="160" y="119" text-anchor="middle" fill="#777" font-size="11">add_edge calls this automatically)</text>

  <!-- Map state -->
  <rect x="55" y="135" width="50" height="26" rx="5" fill="#2980b9"/>
  <text x="80" y="153" text-anchor="middle" fill="white" font-size="11" font-weight="bold">A</text>
  <text x="118" y="153" fill="#999" font-size="13">&#x2192;</text>
  <text x="140" y="153" fill="#bbb" font-size="11">[ ]</text>
  <text x="175" y="153" fill="#777" font-size="10">empty vector</text>

  <!-- Mini graph -->
  <circle cx="80" cy="182" r="14" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="80" y="187" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">A</text>
  <text x="110" y="187" fill="#777" font-size="10">isolated vertex</text>

  <!-- Step number -->
  <circle cx="50" cy="82" r="11" fill="#27ae60"/>
  <text x="50" y="86" text-anchor="middle" fill="white" font-size="11" font-weight="bold">1</text>

  <!-- ===== STEP 2: add_edge("A", "B") ===== -->
  <rect x="315" y="65" width="260" height="135" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="445" y="88" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold" font-family="Consolas, monospace">add_edge("A", "B")</text>
  <text x="445" y="106" text-anchor="middle" fill="#777" font-size="11">Creates both vertices, links both ways</text>

  <!-- Map state -->
  <rect x="335" y="118" width="30" height="22" rx="4" fill="#2980b9"/>
  <text x="350" y="134" text-anchor="middle" fill="white" font-size="10" font-weight="bold">A</text>
  <text x="375" y="134" fill="#999" font-size="12">&#x2192;</text>
  <rect x="390" y="118" width="30" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="405" y="134" text-anchor="middle" fill="#2c3e50" font-size="10">B</text>

  <rect x="335" y="146" width="30" height="22" rx="4" fill="#2980b9"/>
  <text x="350" y="162" text-anchor="middle" fill="white" font-size="10" font-weight="bold">B</text>
  <text x="375" y="162" fill="#999" font-size="12">&#x2192;</text>
  <rect x="390" y="146" width="30" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="405" y="162" text-anchor="middle" fill="#2c3e50" font-size="10">A</text>

  <text x="450" y="136" fill="#c0392b" font-size="10" font-weight="bold">both</text>
  <text x="450" y="150" fill="#c0392b" font-size="10" font-weight="bold">directions!</text>

  <!-- Mini graph -->
  <circle cx="390" cy="185" r="12" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="390" y="190" text-anchor="middle" fill="#2c3e50" font-size="9" font-weight="bold">A</text>
  <line x1="402" y1="185" x2="438" y2="185" stroke="#2980b9" stroke-width="2"/>
  <circle cx="450" cy="185" r="12" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="450" y="190" text-anchor="middle" fill="#2c3e50" font-size="9" font-weight="bold">B</text>

  <!-- Step number -->
  <circle cx="335" cy="82" r="11" fill="#2980b9"/>
  <text x="335" y="86" text-anchor="middle" fill="white" font-size="11" font-weight="bold">2</text>

  <!-- ===== STEP 3: add_edge("A", "C") ===== -->
  <rect x="600" y="65" width="270" height="135" rx="10" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="735" y="88" text-anchor="middle" fill="#8e44ad" font-size="13" font-weight="bold" font-family="Consolas, monospace">add_edge("A", "C")</text>
  <text x="735" y="106" text-anchor="middle" fill="#777" font-size="11">A already exists, appends to its list</text>

  <!-- Map state -->
  <rect x="620" y="118" width="30" height="22" rx="4" fill="#2980b9"/>
  <text x="635" y="134" text-anchor="middle" fill="white" font-size="10" font-weight="bold">A</text>
  <text x="660" y="134" fill="#999" font-size="12">&#x2192;</text>
  <rect x="673" y="118" width="30" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="688" y="134" text-anchor="middle" fill="#2c3e50" font-size="10">B</text>
  <rect x="708" y="118" width="30" height="22" rx="3" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="723" y="134" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">C</text>
  <text x="750" y="134" fill="#e67e22" font-size="9">new!</text>

  <rect x="620" y="146" width="30" height="22" rx="4" fill="#2980b9"/>
  <text x="635" y="162" text-anchor="middle" fill="white" font-size="10" font-weight="bold">B</text>
  <text x="660" y="162" fill="#999" font-size="12">&#x2192;</text>
  <rect x="673" y="146" width="30" height="22" rx="3" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="688" y="162" text-anchor="middle" fill="#2c3e50" font-size="10">A</text>

  <rect x="620" y="168" width="30" height="22" rx="4" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="635" y="184" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">C</text>
  <text x="660" y="184" fill="#999" font-size="12">&#x2192;</text>
  <rect x="673" y="168" width="30" height="22" rx="3" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="688" y="184" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">A</text>

  <!-- Step number -->
  <circle cx="620" cy="82" r="11" fill="#8e44ad"/>
  <text x="620" y="86" text-anchor="middle" fill="white" font-size="11" font-weight="bold">3</text>

  <!-- ===== FULL EXAMPLE ===== -->
  <rect x="30" y="220" width="840" height="280" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="450" y="248" text-anchor="middle" fill="#2c3e50" font-size="15" font-weight="bold">Full Example: Building the Social Network</text>

  <!-- Code calls -->
  <rect x="55" y="265" width="350" height="150" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="70" y="285" fill="#777" font-size="11">Code:</text>
  <text font-family="Consolas, monospace" font-size="12">
    <tspan x="70" y="305" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Alice"</tspan>, <tspan fill="#2980b9">"Bob"</tspan>);</tspan>
    <tspan x="70" y="323" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Alice"</tspan>, <tspan fill="#2980b9">"Carol"</tspan>);</tspan>
    <tspan x="70" y="341" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Bob"</tspan>,   <tspan fill="#2980b9">"Dave"</tspan>);</tspan>
    <tspan x="70" y="359" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Bob"</tspan>,   <tspan fill="#2980b9">"Eve"</tspan>);</tspan>
    <tspan x="70" y="377" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Carol"</tspan>, <tspan fill="#2980b9">"Eve"</tspan>);</tspan>
  </text>

  <!-- Arrow -->
  <text x="430" y="340" fill="#e67e22" font-size="24" font-weight="bold">&#x2192;</text>

  <!-- Resulting graph -->
  <circle cx="560" cy="290" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="560" y="295" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Alice</text>

  <circle cx="680" cy="280" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="680" y="285" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Bob</text>

  <circle cx="510" cy="370" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="510" y="375" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Carol</text>

  <circle cx="750" cy="340" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="750" y="345" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Dave</text>

  <circle cx="630" cy="385" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="630" y="390" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">Eve</text>

  <!-- Edges -->
  <line x1="577" y1="287" x2="663" y2="280" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="550" y1="305" x2="520" y2="355" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="695" y1="290" x2="738" y2="326" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="672" y1="296" x2="638" y2="370" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="525" y1="380" x2="613" y2="385" stroke="#2980b9" stroke-width="1.5"/>

  <!-- Stats -->
  <text x="770" y="400" fill="#27ae60" font-size="12" font-weight="bold">5 vertices</text>
  <text x="770" y="418" fill="#27ae60" font-size="12" font-weight="bold">5 edges</text>
  <text x="770" y="436" fill="#777" font-size="10">10 entries total</text>
  <text x="770" y="448" fill="#777" font-size="10">(each edge stored</text>
  <text x="770" y="460" fill="#777" font-size="10">in both directions)</text>

  <!-- Key insight -->
  <rect x="55" y="415" width="350" height="45" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="1.2"/>
  <text x="230" y="437" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">add_edge creates vertices automatically &#x2014;</text>
  <text x="230" y="453" text-anchor="middle" fill="#555" font-size="11">no need to call add_vertex first</text>
</svg>
