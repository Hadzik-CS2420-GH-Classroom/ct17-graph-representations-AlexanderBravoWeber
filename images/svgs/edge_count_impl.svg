<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">edge_count() &#x2014; Sum All Neighbors, Divide by 2</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Each undirected edge is stored twice &#x2014; once in each direction</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- Row backgrounds -->
  <rect x="20" y="78" width="820" height="56" fill="#f9f9f9"/>
  <rect x="20" y="134" width="820" height="70" fill="white"/>
  <rect x="20" y="204" width="820" height="56" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Setup ===== -->
  <rect x="30" y="90" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="108" fill="#569cd6">int</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">total</tspan><tspan fill="#ddd"> = 0;</tspan>
  </text>

  <line x1="410" y1="103" x2="458" y2="103" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,99 466,103 458,107" fill="#bdc3c7"/>

  <text x="476" y="102" font-size="11" fill="#555">Accumulator for total neighbor list entries.</text>

  <!-- ===== ROW 2: Structured binding loop ===== -->
  <rect x="30" y="142" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="158" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; [</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">nbrs</tspan><tspan fill="#ddd">] : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">)</tspan>
    <tspan x="70" y="174" fill="#9cdcfe">total</tspan><tspan fill="#ddd"> += </tspan><tspan fill="#dcdcaa">static_cast</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt;(</tspan><tspan fill="#9cdcfe">nbrs</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">size</tspan><tspan fill="#ddd">());</tspan>
  </text>

  <line x1="410" y1="162" x2="458" y2="162" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,158 466,162 458,166" fill="#bdc3c7"/>

  <text x="476" y="152" font-size="11" fill="#555"><tspan font-weight="bold">Structured binding</tspan> (C++17): iterate every</text>
  <text x="476" y="168" font-size="11" fill="#555">vertex and its neighbor vector. Sum all sizes.</text>
  <text x="476" y="184" font-size="10" fill="#888">Each neighbor list entry = one direction of an edge.</text>

  <!-- ===== ROW 3: Divide by 2 ===== -->
  <rect x="30" y="216" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="50" y="234" fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">total</tspan><tspan fill="#ddd"> / 2;</tspan>
  </text>

  <line x1="410" y1="229" x2="458" y2="229" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,225 466,229 458,233" fill="#bdc3c7"/>

  <text x="476" y="224" font-size="11" fill="#c0392b" font-weight="bold">Divide by 2!</text>
  <text x="476" y="240" font-size="11" fill="#555">Edge A&#x2014;B is in both A's list and B's list.</text>

  <!-- ===== VISUAL EXAMPLE ===== -->
  <rect x="30" y="272" width="800" height="110" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.2"/>
  <text x="430" y="296" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Example: Triangle Graph (A&#x2014;B, A&#x2014;C, B&#x2014;C)</text>

  <!-- Adjacency list -->
  <text x="80" y="322" font-size="11" fill="#555" font-family="Consolas, monospace">A &#x2192; [B, C]</text>
  <text x="230" y="322" font-size="11" fill="#888">= 2</text>
  <text x="80" y="340" font-size="11" fill="#555" font-family="Consolas, monospace">B &#x2192; [A, C]</text>
  <text x="230" y="340" font-size="11" fill="#888">= 2</text>
  <text x="80" y="358" font-size="11" fill="#555" font-family="Consolas, monospace">C &#x2192; [A, B]</text>
  <text x="230" y="358" font-size="11" fill="#888">= 2</text>

  <!-- Sum and result -->
  <text x="320" y="340" font-size="12" fill="#555">total = 6</text>
  <text x="320" y="358" font-size="12" fill="#c0392b" font-weight="bold">/ 2 = 3 edges &#x2713;</text>

  <!-- Triangle graph -->
  <circle cx="580" cy="316" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="580" y="322" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">A</text>
  <circle cx="660" cy="316" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="660" y="322" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">B</text>
  <circle cx="620" cy="370" r="18" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="620" y="376" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">C</text>
  <line x1="598" y1="316" x2="642" y2="316" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="572" y1="330" x2="610" y2="356" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="648" y1="330" x2="630" y2="356" stroke="#2980b9" stroke-width="1.5"/>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="392" width="800" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="410" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">O(V) &#x2014; visits each vertex once to read its neighbor count.</text>
  <text x="430" y="426" text-anchor="middle" fill="#888" font-size="11">The structured binding [vertex, nbrs] unpacks each key-value pair from the map.</text>
</svg>