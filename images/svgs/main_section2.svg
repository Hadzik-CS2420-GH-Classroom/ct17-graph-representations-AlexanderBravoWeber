<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Section 2: Queries</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">Asking questions about the graph without changing it</text>

  <!-- Code + Output side by side -->
  <rect x="30" y="65" width="420" height="220" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="240" y="88" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">Code</text>
  <text font-family="Consolas, monospace" font-size="11">
    <tspan x="50" y="112" fill="#2c3e50">g.has_vertex(<tspan fill="#2980b9">"Alice"</tspan>)</tspan>
    <tspan x="50" y="140" fill="#2c3e50">g.has_vertex(<tspan fill="#2980b9">"Frank"</tspan>)</tspan>
    <tspan x="50" y="168" fill="#2c3e50">g.has_edge(<tspan fill="#2980b9">"Alice"</tspan>, <tspan fill="#2980b9">"Bob"</tspan>)</tspan>
    <tspan x="50" y="196" fill="#2c3e50">g.has_edge(<tspan fill="#2980b9">"Alice"</tspan>, <tspan fill="#2980b9">"Dave"</tspan>)</tspan>
    <tspan x="50" y="224" fill="#2c3e50">g.neighbors(<tspan fill="#2980b9">"Alice"</tspan>)</tspan>
  </text>

  <rect x="470" y="65" width="400" height="220" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="670" y="88" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Output</text>
  <text font-size="12">
    <tspan x="490" y="112" fill="#27ae60" font-weight="bold">true</tspan><tspan fill="#777"> &#x2014; Alice is a key in the map</tspan>
    <tspan x="490" y="140" fill="#c0392b" font-weight="bold">false</tspan><tspan fill="#777"> &#x2014; Frank is not in the graph</tspan>
    <tspan x="490" y="168" fill="#27ae60" font-weight="bold">true</tspan><tspan fill="#777"> &#x2014; Bob is in Alice's list</tspan>
    <tspan x="490" y="196" fill="#c0392b" font-weight="bold">false</tspan><tspan fill="#777"> &#x2014; Dave is not in Alice's list</tspan>
    <tspan x="490" y="224" fill="#2980b9" font-weight="bold">Bob Carol</tspan><tspan fill="#777"> &#x2014; Alice's neighbors</tspan>
  </text>
</svg>
