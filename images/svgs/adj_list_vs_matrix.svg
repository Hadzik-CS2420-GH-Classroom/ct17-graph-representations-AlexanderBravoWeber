<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Adjacency List vs Adjacency Matrix</text>

  <!-- Reference graph -->
  <text x="450" y="60" text-anchor="middle" fill="#777" font-size="12">Graph: A--B, A--C, B--C, B--D</text>

  <circle cx="360" cy="105" r="16" fill="white" stroke="#e67e22" stroke-width="2"/>
  <text x="360" y="110" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">A</text>
  <circle cx="450" cy="80" r="16" fill="white" stroke="#e67e22" stroke-width="2"/>
  <text x="450" y="85" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">B</text>
  <circle cx="540" cy="105" r="16" fill="white" stroke="#e67e22" stroke-width="2"/>
  <text x="540" y="110" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">C</text>
  <circle cx="450" cy="150" r="16" fill="white" stroke="#e67e22" stroke-width="2"/>
  <text x="450" y="155" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">D</text>

  <line x1="376" y1="101" x2="434" y2="84" stroke="#e67e22" stroke-width="1.5"/>
  <line x1="376" y1="109" x2="524" y2="105" stroke="#e67e22" stroke-width="1.5"/>
  <line x1="466" y1="84" x2="524" y2="101" stroke="#e67e22" stroke-width="1.5"/>
  <line x1="450" y1="96" x2="450" y2="134" stroke="#e67e22" stroke-width="1.5"/>

  <!-- ===== ADJACENCY LIST (left) ===== -->
  <rect x="30" y="175" width="400" height="245" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="230" y="203" text-anchor="middle" fill="#27ae60" font-size="15" font-weight="bold">Adjacency List</text>

  <!-- Key: A -->
  <rect x="60" y="220" width="40" height="30" rx="5" fill="#27ae60"/>
  <text x="80" y="240" text-anchor="middle" fill="white" font-size="13" font-weight="bold">A</text>
  <text x="115" y="240" fill="#999" font-size="13">&#x2192;</text>
  <rect x="140" y="224" width="35" height="22" rx="4" fill="#eaf7ea" stroke="#27ae60" stroke-width="1"/>
  <text x="157" y="240" text-anchor="middle" fill="#2c3e50" font-size="11">B</text>
  <rect x="182" y="224" width="35" height="22" rx="4" fill="#eaf7ea" stroke="#27ae60" stroke-width="1"/>
  <text x="199" y="240" text-anchor="middle" fill="#2c3e50" font-size="11">C</text>

  <!-- Key: B -->
  <rect x="60" y="260" width="40" height="30" rx="5" fill="#27ae60"/>
  <text x="80" y="280" text-anchor="middle" fill="white" font-size="13" font-weight="bold">B</text>
  <text x="115" y="280" fill="#999" font-size="13">&#x2192;</text>
  <rect x="140" y="264" width="35" height="22" rx="4" fill="#eaf7ea" stroke="#27ae60" stroke-width="1"/>
  <text x="157" y="280" text-anchor="middle" fill="#2c3e50" font-size="11">A</text>
  <rect x="182" y="264" width="35" height="22" rx="4" fill="#eaf7ea" stroke="#27ae60" stroke-width="1"/>
  <text x="199" y="280" text-anchor="middle" fill="#2c3e50" font-size="11">C</text>
  <rect x="224" y="264" width="35" height="22" rx="4" fill="#eaf7ea" stroke="#27ae60" stroke-width="1"/>
  <text x="241" y="280" text-anchor="middle" fill="#2c3e50" font-size="11">D</text>

  <!-- Key: C -->
  <rect x="60" y="300" width="40" height="30" rx="5" fill="#27ae60"/>
  <text x="80" y="320" text-anchor="middle" fill="white" font-size="13" font-weight="bold">C</text>
  <text x="115" y="320" fill="#999" font-size="13">&#x2192;</text>
  <rect x="140" y="304" width="35" height="22" rx="4" fill="#eaf7ea" stroke="#27ae60" stroke-width="1"/>
  <text x="157" y="320" text-anchor="middle" fill="#2c3e50" font-size="11">A</text>
  <rect x="182" y="304" width="35" height="22" rx="4" fill="#eaf7ea" stroke="#27ae60" stroke-width="1"/>
  <text x="199" y="320" text-anchor="middle" fill="#2c3e50" font-size="11">B</text>

  <!-- Key: D -->
  <rect x="60" y="340" width="40" height="30" rx="5" fill="#27ae60"/>
  <text x="80" y="360" text-anchor="middle" fill="white" font-size="13" font-weight="bold">D</text>
  <text x="115" y="360" fill="#999" font-size="13">&#x2192;</text>
  <rect x="140" y="344" width="35" height="22" rx="4" fill="#eaf7ea" stroke="#27ae60" stroke-width="1"/>
  <text x="157" y="360" text-anchor="middle" fill="#2c3e50" font-size="11">B</text>

  <text x="230" y="400" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Space: O(V + E)</text>
  <text x="230" y="416" text-anchor="middle" fill="#777" font-size="11">Best for sparse graphs</text>

  <!-- ===== ADJACENCY MATRIX (right) ===== -->
  <rect x="470" y="175" width="400" height="245" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="670" y="203" text-anchor="middle" fill="#2980b9" font-size="15" font-weight="bold">Adjacency Matrix</text>

  <!-- Column headers -->
  <text x="580" y="230" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">A</text>
  <text x="630" y="230" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">B</text>
  <text x="680" y="230" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">C</text>
  <text x="730" y="230" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">D</text>

  <!-- Row A -->
  <text x="540" y="260" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">A</text>
  <rect x="562" y="243" width="36" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="580" y="261" text-anchor="middle" fill="#ccc" font-size="13">0</text>
  <rect x="612" y="243" width="36" height="26" rx="3" fill="#d4efdf" stroke="#27ae60"/>
  <text x="630" y="261" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">1</text>
  <rect x="662" y="243" width="36" height="26" rx="3" fill="#d4efdf" stroke="#27ae60"/>
  <text x="680" y="261" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">1</text>
  <rect x="712" y="243" width="36" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="730" y="261" text-anchor="middle" fill="#ccc" font-size="13">0</text>

  <!-- Row B -->
  <text x="540" y="295" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">B</text>
  <rect x="562" y="278" width="36" height="26" rx="3" fill="#d4efdf" stroke="#27ae60"/>
  <text x="580" y="296" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">1</text>
  <rect x="612" y="278" width="36" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="630" y="296" text-anchor="middle" fill="#ccc" font-size="13">0</text>
  <rect x="662" y="278" width="36" height="26" rx="3" fill="#d4efdf" stroke="#27ae60"/>
  <text x="680" y="296" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">1</text>
  <rect x="712" y="278" width="36" height="26" rx="3" fill="#d4efdf" stroke="#27ae60"/>
  <text x="730" y="296" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">1</text>

  <!-- Row C -->
  <text x="540" y="330" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">C</text>
  <rect x="562" y="313" width="36" height="26" rx="3" fill="#d4efdf" stroke="#27ae60"/>
  <text x="580" y="331" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">1</text>
  <rect x="612" y="313" width="36" height="26" rx="3" fill="#d4efdf" stroke="#27ae60"/>
  <text x="630" y="331" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">1</text>
  <rect x="662" y="313" width="36" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="680" y="331" text-anchor="middle" fill="#ccc" font-size="13">0</text>
  <rect x="712" y="313" width="36" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="730" y="331" text-anchor="middle" fill="#ccc" font-size="13">0</text>

  <!-- Row D -->
  <text x="540" y="365" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">D</text>
  <rect x="562" y="348" width="36" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="580" y="366" text-anchor="middle" fill="#ccc" font-size="13">0</text>
  <rect x="612" y="348" width="36" height="26" rx="3" fill="#d4efdf" stroke="#27ae60"/>
  <text x="630" y="366" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">1</text>
  <rect x="662" y="348" width="36" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="680" y="366" text-anchor="middle" fill="#ccc" font-size="13">0</text>
  <rect x="712" y="348" width="36" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="730" y="366" text-anchor="middle" fill="#ccc" font-size="13">0</text>

  <text x="670" y="400" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold">Space: O(V^2)</text>
  <text x="670" y="416" text-anchor="middle" fill="#777" font-size="11">Fast edge lookup O(1), wasteful for sparse graphs</text>

  <!-- ===== DETAIL: Adjacency List ===== -->
  <rect x="30" y="435" width="400" height="110" rx="10" fill="white" stroke="#27ae60" stroke-width="1.2"/>
  <text x="230" y="458" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">How It's Built</text>
  <text x="50" y="478" fill="#555" font-size="11"><tspan font-weight="bold">Data structure:</tspan> unordered_map&lt;string, vector&lt;string&gt;&gt;</text>
  <text x="50" y="496" fill="#555" font-size="11"><tspan font-weight="bold">Each key</tspan> is a vertex; <tspan font-weight="bold">each value</tspan> is its neighbor list</text>
  <text x="50" y="514" fill="#555" font-size="11"><tspan font-weight="bold">Best when:</tspan> few edges relative to vertices (sparse)</text>
  <text x="50" y="532" fill="#555" font-size="11"><tspan font-weight="bold">Used by:</tspan> this class (Graph) &#x2014; and most real-world graphs</text>

  <!-- ===== DETAIL: Adjacency Matrix ===== -->
  <rect x="470" y="435" width="400" height="110" rx="10" fill="white" stroke="#2980b9" stroke-width="1.2"/>
  <text x="670" y="458" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">How It's Built</text>
  <text x="490" y="478" fill="#555" font-size="11"><tspan font-weight="bold">Data structure:</tspan> 2D array (vector&lt;vector&lt;int&gt;&gt;)</text>
  <text x="490" y="496" fill="#555" font-size="11"><tspan font-weight="bold">matrix[i][j] = 1</tspan> if edge exists, <tspan font-weight="bold">0</tspan> if not</text>
  <text x="490" y="514" fill="#555" font-size="11"><tspan font-weight="bold">Best when:</tspan> many edges (dense) or need O(1) edge check</text>
  <text x="490" y="532" fill="#555" font-size="11"><tspan font-weight="bold">Drawback:</tspan> wastes memory when most cells are 0</text>
</svg>
