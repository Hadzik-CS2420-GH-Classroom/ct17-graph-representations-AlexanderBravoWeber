<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Section 1: Build a Graph</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">5 edges build the social network step by step</text>

  <!-- Code -->
  <rect x="30" y="65" width="350" height="160" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text font-family="Consolas, monospace" font-size="11">
    <tspan x="50" y="88" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Alice"</tspan>, <tspan fill="#2980b9">"Bob"</tspan>);</tspan>
    <tspan x="50" y="106" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Alice"</tspan>, <tspan fill="#2980b9">"Carol"</tspan>);</tspan>
    <tspan x="50" y="124" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Bob"</tspan>,   <tspan fill="#2980b9">"Dave"</tspan>);</tspan>
    <tspan x="50" y="142" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Bob"</tspan>,   <tspan fill="#2980b9">"Eve"</tspan>);</tspan>
    <tspan x="50" y="160" fill="#2c3e50">g.add_edge(<tspan fill="#2980b9">"Carol"</tspan>, <tspan fill="#2980b9">"Eve"</tspan>);</tspan>
  </text>
  <text x="50" y="195" fill="#777" font-size="11">Vertices: 5</text>
  <text x="50" y="212" fill="#777" font-size="11">Edges: 5</text>

  <!-- Arrow -->
  <text x="390" y="140" fill="#e67e22" font-size="24" font-weight="bold">&#x2192;</text>

  <!-- Resulting graph -->
  <rect x="420" y="65" width="460" height="210" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="650" y="90" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">Resulting Graph</text>

  <circle cx="650" cy="125" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="650" y="131" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Alice</text>

  <circle cx="555" cy="195" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="555" y="201" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Bob</text>

  <circle cx="745" cy="195" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="745" y="201" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Carol</text>

  <circle cx="495" cy="250" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="495" y="256" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Dave</text>

  <circle cx="650" cy="250" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="650" y="256" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Eve</text>

  <!-- Edges -->
  <line x1="635" y1="142" x2="570" y2="178" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="665" y1="142" x2="730" y2="178" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="540" y1="212" x2="510" y2="233" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="570" y1="212" x2="635" y2="233" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="730" y1="212" x2="665" y2="233" stroke="#2980b9" stroke-width="1.5"/>

  <!-- Adjacency list output -->
  <rect x="30" y="285" width="840" height="180" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="310" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Adjacency List (what g.print() outputs)</text>

  <rect x="60" y="325" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="87" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Alice</text>
  <text x="128" y="343" fill="#999" font-size="12">&#x2192;</text>
  <text x="148" y="343" fill="#2c3e50" font-size="11">Bob, Carol</text>

  <rect x="60" y="358" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="87" y="376" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Bob</text>
  <text x="128" y="376" fill="#999" font-size="12">&#x2192;</text>
  <text x="148" y="376" fill="#2c3e50" font-size="11">Alice, Dave, Eve</text>

  <rect x="60" y="391" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="87" y="409" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Carol</text>
  <text x="128" y="409" fill="#999" font-size="12">&#x2192;</text>
  <text x="148" y="409" fill="#2c3e50" font-size="11">Alice, Eve</text>

  <rect x="450" y="325" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="477" y="343" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Dave</text>
  <text x="518" y="343" fill="#999" font-size="12">&#x2192;</text>
  <text x="538" y="343" fill="#2c3e50" font-size="11">Bob</text>

  <rect x="450" y="358" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="477" y="376" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Eve</text>
  <text x="518" y="376" fill="#999" font-size="12">&#x2192;</text>
  <text x="538" y="376" fill="#2c3e50" font-size="11">Bob, Carol</text>

  <text x="450" y="450" text-anchor="middle" fill="#777" font-size="11">Each edge appears twice (undirected) &#x2014; 5 edges = 10 total entries</text>
</svg>
