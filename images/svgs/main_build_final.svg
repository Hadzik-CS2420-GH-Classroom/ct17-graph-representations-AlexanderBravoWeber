<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Section 1, Steps 4-5: Final Graph</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">add_edge("Bob","Eve") then add_edge("Carol","Eve") &#x2014; graph complete</text>

  <!-- Remaining calls -->
  <rect x="30" y="65" width="420" height="100" rx="10" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="240" y="88" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Last Two Calls</text>

  <text x="50" y="115" fill="#2c3e50" font-size="12" font-family="Consolas, monospace">g.add_edge(<tspan fill="#2980b9">"Bob"</tspan>, <tspan fill="#e67e22">"Eve"</tspan>);</text>
  <text x="340" y="115" fill="#777" font-size="10">creates Eve, links to Bob</text>

  <text x="50" y="140" fill="#2c3e50" font-size="12" font-family="Consolas, monospace">g.add_edge(<tspan fill="#2980b9">"Carol"</tspan>, <tspan fill="#e67e22">"Eve"</tspan>);</text>
  <text x="340" y="140" fill="#777" font-size="10">both exist, just append</text>

  <!-- Final graph -->
  <rect x="470" y="65" width="400" height="230" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="670" y="90" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">Final Graph (5 vertices, 5 edges)</text>

  <circle cx="670" cy="125" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="670" y="131" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Alice</text>

  <circle cx="570" cy="195" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="570" y="201" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Bob</text>

  <circle cx="770" cy="195" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="770" y="201" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Carol</text>

  <circle cx="520" cy="260" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="520" y="266" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Dave</text>

  <circle cx="670" cy="260" r="22" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="670" y="266" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Eve</text>

  <line x1="655" y1="142" x2="585" y2="178" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="685" y1="142" x2="755" y2="178" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="555" y1="212" x2="535" y2="243" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="585" y1="212" x2="655" y2="243" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="755" y1="212" x2="685" y2="243" stroke="#2980b9" stroke-width="1.5"/>

  <!-- Final adjacency list -->
  <rect x="30" y="185" width="420" height="240" rx="10" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="240" y="210" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Final adj_list_ (what g.print() outputs)</text>

  <rect x="55" y="225" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="82" y="243" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Alice</text>
  <text x="120" y="243" fill="#999" font-size="12">&#x2192;</text>
  <rect x="138" y="229" width="40" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="158" y="243" text-anchor="middle" fill="#2c3e50" font-size="10">Bob</text>
  <rect x="183" y="229" width="48" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="207" y="243" text-anchor="middle" fill="#2c3e50" font-size="10">Carol</text>

  <rect x="55" y="258" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="82" y="276" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Bob</text>
  <text x="120" y="276" fill="#999" font-size="12">&#x2192;</text>
  <rect x="138" y="262" width="45" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="160" y="276" text-anchor="middle" fill="#2c3e50" font-size="10">Alice</text>
  <rect x="188" y="262" width="45" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="210" y="276" text-anchor="middle" fill="#2c3e50" font-size="10">Dave</text>
  <rect x="238" y="262" width="38" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="257" y="276" text-anchor="middle" fill="#2c3e50" font-size="10">Eve</text>

  <rect x="55" y="291" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="82" y="309" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Carol</text>
  <text x="120" y="309" fill="#999" font-size="12">&#x2192;</text>
  <rect x="138" y="295" width="45" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="160" y="309" text-anchor="middle" fill="#2c3e50" font-size="10">Alice</text>
  <rect x="188" y="295" width="38" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="207" y="309" text-anchor="middle" fill="#2c3e50" font-size="10">Eve</text>

  <rect x="55" y="324" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="82" y="342" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Dave</text>
  <text x="120" y="342" fill="#999" font-size="12">&#x2192;</text>
  <rect x="138" y="328" width="40" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="158" y="342" text-anchor="middle" fill="#2c3e50" font-size="10">Bob</text>

  <rect x="55" y="357" width="55" height="26" rx="5" fill="#27ae60"/>
  <text x="82" y="375" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Eve</text>
  <text x="120" y="375" fill="#999" font-size="12">&#x2192;</text>
  <rect x="138" y="361" width="40" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="158" y="375" text-anchor="middle" fill="#2c3e50" font-size="10">Bob</text>
  <rect x="183" y="361" width="48" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="1"/>
  <text x="207" y="375" text-anchor="middle" fill="#2c3e50" font-size="10">Carol</text>

  <text x="240" y="405" text-anchor="middle" fill="#777" font-size="11">5 keys &#xD7; variable-length lists = 10 total entries (5 edges &#xD7; 2)</text>
</svg>
